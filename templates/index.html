      const inp = "bg-gray-700 text-white rounded px-2 py-1 text-xs border border-gray-600 focus:border-purple-500 focus:outline-none";

      return (
        <div className="bg-gray-800 rounded-xl overflow-hidden slide-in border border-gray-700">
          {/* Header */}
          <div className="px-5 py-3 bg-gray-700/40 border-b border-gray-700 flex items-center justify-between gap-4 flex-wrap">
            <h3 className="text-white font-bold text-sm">{isEdit?'✏️ ハンド編集':'➕ ハンドレビュー追加'}</h3>
            <div className="flex items-center gap-3 flex-wrap">
              <div className="flex items-center gap-2">
                <label className="text-gray-400 text-xs">日付</label>
                <input type="date" value={form.date} onChange={e=>set('date',e.target.value)} className={`${inp} w-32`}/>
              </div>
              <label className="flex items-center gap-1.5 cursor-pointer select-none">
                <input type="checkbox" checked={form.hasAnte} onChange={e=>set('hasAnte',e.target.checked)} className="w-3.5 h-3.5 accent-purple-500"/>
                <span className="text-gray-400 text-xs">アンティ</span>
                {form.hasAnte&&<>
                  <input type="number" step="0.5" min="0" value={form.anteBb} onChange={e=>set('anteBb',e.target.value)}
                    className={`${inp} w-12 text-center`} placeholder="1"/>
                  <span className="text-gray-500 text-xs">bb (BBアンティ)</span>
                </>}
              </label>
              <div className="flex items-center gap-2">
                <label className="text-gray-400 text-xs">結果 (BB)</label>
                <input type="number" value={form.resultBb} onChange={e=>set('resultBb',e.target.value)} step="0.1" placeholder="±0.0" className={`${inp} w-20`}/>
              </div>
              <div className="flex gap-2">
                <button onClick={onCancel} className="px-3 py-1.5 text-gray-400 hover:text-white text-xs">キャンセル</button>
                <button onClick={submit} className="bg-purple-600 hover:bg-purple-500 text-white px-4 py-1.5 rounded-lg text-xs font-bold">保存</button>
              </div>
            </div>
          </div>
          {/* Column headers */}
          <div className="grid bg-gray-700/20 border-b border-gray-700/60" style={{gridTemplateColumns:'18% 30% 52%'}}>
            {['ボード','アクション (★Hero ●Villain)','分析メモ'].map((h,i)=>(
              <div key={h} className={`px-3 py-1.5 text-xs text-gray-500 font-medium ${i<2?'border-r border-gray-700/60':''}`}>{h}</div>
            ))}
          </div>
          {/* PREFLOP */}
          <HRStreetRow label="PREFLOP" color="text-yellow-400" pot={preflopPot} minH="250px"
            memo={form.preflopMemo} onMemo={v=>set('preflopMemo',v)}
            leftContent={<>
              <div className="flex items-center gap-1 mb-1">
                <span className="text-gray-500 text-xs w-8 flex-shrink-0">Hero</span>
                <select value={form.heroPosition} onChange={e=>set('heroPosition',e.target.value)} className={`${inp} flex-1`}>
                  {POSITIONS.map(p=><option key={p}>{p}</option>)}
                </select>
              </div>
              <div className="flex items-center gap-1 mb-2">
                <span className="text-gray-500 text-xs w-8 flex-shrink-0">Vil.</span>
                <select value={form.villainPosition} onChange={e=>set('villainPosition',e.target.value)} className={`${inp} flex-1`}>
                  {POSITIONS.map(p=><option key={p}>{p}</option>)}
                </select>
              </div>
              <div className="mb-1">
                <div className="text-green-600 text-xs mb-0.5">Hero Hand</div>
                <div className="flex gap-1">{[0,1].map(i=><CardPicker key={i} value={form.heroHand[i]} onChange={c=>setCard('heroHand',i,c)}/>)}</div>
              </div>
              <div>
                <div className="text-red-600 text-xs mb-0.5">Villain Hand</div>
                <div className="flex gap-1">{[0,1].map(i=><CardPicker key={i} value={form.villainHand[i]} onChange={c=>setCard('villainHand',i,c)}/>)}</div>
              </div>
            </>}
            actionContent={<HRActionRows street="preflop" players={POSITIONS} actsObj={form.preflopActs} heroPos={form.heroPosition} vilPos={form.villainPosition} onSetAct={setAct}/>}
          />
          {/* FLOP */}
          <HRStreetRow label="FLOP" color="text-blue-400" pot={flopPot} minH="110px"
            memo={form.flopMemo} onMemo={v=>set('flopMemo',v)}
            leftContent={<div className="flex gap-1 flex-wrap">{[0,1,2].map(i=><CardPicker key={i} value={form.flopBoard[i]} onChange={c=>setCard('flopBoard',i,c)}/>)}</div>}
            actionContent={flopActive.length>0
              ?<HRActionRows street="flop" players={flopActive} actsObj={form.flopActs} heroPos={form.heroPosition} vilPos={form.villainPosition} onSetAct={setAct}/>
              :<div className="text-gray-700 text-xs p-2">アクティブなし</div>}
          />
          {/* TURN */}
          <HRStreetRow label="TURN" color="text-orange-400" pot={turnPot} minH="80px"
            memo={form.turnMemo} onMemo={v=>set('turnMemo',v)}
            leftContent={<CardPicker value={form.turnCard} onChange={c=>set('turnCard',c)}/>}
            actionContent={turnActive.length>0
              ?<HRActionRows street="turn" players={turnActive} actsObj={form.turnActs} heroPos={form.heroPosition} vilPos={form.villainPosition} onSetAct={setAct}/>
              :<div className="text-gray-700 text-xs p-2">アクティブなし</div>}
          />
          {/* RIVER */}
          <HRStreetRow label="RIVER" color="text-red-400" pot={riverPot} minH="80px"
            memo={form.riverMemo} onMemo={v=>set('riverMemo',v)}
            leftContent={<CardPicker value={form.riverCard} onChange={c=>set('riverCard',c)}/>}
            actionContent={riverActive.length>0
              ?<HRActionRows street="river" players={riverActive} actsObj={form.riverActs} heroPos={form.heroPosition} vilPos={form.villainPosition} onSetAct={setAct}/>
              :<div className="text-gray-700 text-xs p-2">アクティブなし</div>}
          />
          {/* Notes */}
          <div className="px-5 py-3 border-t border-gray-700">
            <label className="text-gray-400 text-xs mb-1 block">総評・メモ</label>
            <textarea value={form.notes} onChange={e=>set('notes',e.target.value)} rows={2} placeholder="ハンド全体の振り返り…"
              className="w-full bg-gray-700 text-white rounded-lg px-3 py-2 text-sm border border-gray-600 focus:border-purple-500 focus:outline-none resize-none"/>
          </div>
        </div>
      );
    };

    const HandReviewPage = ({ reviews, onAdd, onUpdate, onDelete }) => {
      const [showForm, setShowForm] = useState(false);
      const [editing,  setEditing]  = useState(null);
      const [deleting, setDeleting] = useState(null);
      const [calMonth, setCalMonth] = useState(thisMonth());

      const monthReviews = reviews.filter(r=>r.date.startsWith(calMonth));
      const monthOpts = useMemo(()=>{
        const s=new Set([thisMonth()]); reviews.forEach(r=>s.add(r.date.slice(0,7)));
        return [...s].sort().reverse();
      },[reviews]);

      const handleSave = async (data) => {
        if (editing) { await onUpdate(data); setEditing(null); }
        else { await onAdd(data); setShowForm(false); }
      };

      return (
        <div className="space-y-4">
          <div className="flex items-center justify-between gap-4 flex-wrap">
            <div>
              <h3 className="text-white font-bold">🎴 ハンドレビュー</h3>
              <p className="text-gray-500 text-xs mt-0.5">{reviews.length} ハンド記録済み</p>
            </div>
            <div className="flex items-center gap-3">
              <select value={calMonth} onChange={e=>setCalMonth(e.target.value)}
                className="bg-gray-800 text-white rounded-lg px-3 py-1.5 text-sm border border-gray-700 focus:outline-none">
                {monthOpts.map(m=><option key={m} value={m}>{m}</option>)}
              </select>
              <button onClick={()=>{setShowForm(true);setEditing(null);}}
                className="bg-purple-600 hover:bg-purple-500 text-white font-bold px-4 py-2 rounded-lg text-sm">＋ 追加</button>
            </div>
          </div>

          {(showForm||editing)&&<HandReviewForm review={editing} onSave={handleSave} onCancel={()=>{setShowForm(false);setEditing(null);}}/>}

          <div className="bg-gray-800 rounded-xl overflow-hidden">
            <div className="px-4 py-3 border-b border-gray-700">
              <h4 className="text-white font-semibold text-sm">{calMonth} のハンド ({monthReviews.length})</h4>
            </div>
            {monthReviews.length===0
              ? <div className="p-8 text-center text-gray-600 text-sm">この月のハンドレビューはありません</div>
              : <div className="divide-y divide-gray-700">
                  {[...monthReviews].map(r=>{
                    const hand = (cards) => (Array.isArray(cards)?cards:[]).filter(Boolean).map((c,i)=><CardDisplay key={i} card={c}/>);
                    return (
                      <div key={r.id} className="px-4 py-3 hover:bg-gray-700/30 transition-colors">
                        <div className="flex items-center gap-3 flex-wrap">
                          <span className="text-gray-400 text-xs font-mono">{fmtDate(r.date)}</span>
                          <div className="flex gap-1">{hand(r.heroHand)}</div>
                          <span className="text-gray-600 text-xs">vs</span>
                          <div className="flex gap-1">{hand(r.villainHand)}</div>
                          <span className="text-gray-500 text-xs">{r.heroPosition} → {r.villainPosition}</span>
                          {r.resultBb!=null&&<span className={`font-mono text-sm font-bold ${r.resultBb>0?'text-emerald-400':r.resultBb<0?'text-red-400':'text-gray-400'}`}>{r.resultBb>0?'+':''}{r.resultBb.toFixed(1)} BB</span>}
                          {(Array.isArray(r.flopBoard)&&r.flopBoard.some(Boolean))&&(
                            <div className="flex gap-1">{hand(r.flopBoard)}{r.turnCard&&<CardDisplay card={r.turnCard}/>}{r.riverCard&&<CardDisplay card={r.riverCard}/>}</div>
                          )}
                          <div className="ml-auto flex gap-2">
                            <button onClick={()=>setEditing(r)} className="text-gray-500 hover:text-blue-400 text-xs px-2 py-1">編集</button>
                            <button onClick={()=>setDeleting(r.id)} className="text-gray-500 hover:text-red-400 text-xs px-2 py-1">削除</button>
                          </div>
                        </div>
                        {r.notes&&<div className="text-gray-600 text-xs mt-1 ml-0 truncate">{r.notes}</div>}
                      </div>
                    );
                  })}
                </div>
            }
          </div>

          {deleting&&(
            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
              <div className="bg-gray-800 rounded-xl p-6 space-y-4 max-w-sm w-full">
                <h3 className="text-white font-bold">削除確認</h3>
                <p className="text-gray-400 text-sm">このハンドを削除しますか？</p>
                <div className="flex gap-3 justify-end">
                  <button onClick={()=>setDeleting(null)} className="text-gray-400 px-4 py-2 text-sm">キャンセル</button>
                  <button onClick={()=>{onDelete(deleting);setDeleting(null);}} className="bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-bold">削除</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ══════════════════════════════════════════════════════════════════════
    // POKER PAGE
    // ══════════════════════════════════════════════════════════════════════
    const POKER_RULES = [
      { key:'ruleNoEmotion',     label:'感情的なプレイをしなかった' },
      { key:'ruleStopTilted',    label:'「イライラ」「退屈でコールしたい」を感じたらプレイをやめた' },
      { key:'ruleNoRandomCalls', label:'適当なコールをしなかった' },
    ];

    const PokerSessionForm = ({ session, onSave, onCancel }) => {
      const isEdit = !!session;
      const [form, setForm] = useState(session || {
        date: todayStr(), hands:'', bbSize:'', resultBb:'',
        ruleNoEmotion:true, ruleStopTilted:true, ruleNoRandomCalls:true, notes:'',
      });
      const set = (k,v) => setForm(f=>({...f,[k]:v}));
      const submit = () => {
        if (!form.date || form.hands==='' || form.bbSize==='' || form.resultBb==='') {
          alert('日付・ハンド数・BB額・勝敗BBを入力してください'); return;
        }
        onSave({ ...form, id: form.id||uid(), hands:parseInt(form.hands)||0,
          bbSize:parseFloat(form.bbSize)||0, resultBb:parseFloat(form.resultBb)||0 });
      };
      return (
        <div className="bg-gray-800 rounded-xl p-5 space-y-4 slide-in">
          <h3 className="text-white font-bold text-sm">{isEdit?'✏️ 編集':'➕ セッション追加'}</h3>
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
            {[
              {label:'日付', type:'date', key:'date'},
              {label:'ハンド数', type:'number', key:'hands', min:0, placeholder:'100'},
              {label:'BB額 ($)', type:'number', key:'bbSize', step:'0.01', min:0, placeholder:'1.00'},
              {label:'勝敗 (BB) — 負は−', type:'number', key:'resultBb', step:'0.1', placeholder:'+10.5'},
            ].map(f=>(
              <div key={f.key}>
                <label className="text-gray-400 text-xs mb-1 block">{f.label}</label>
                <input type={f.type} value={form[f.key]} onChange={e=>set(f.key,e.target.value)}
                  min={f.min} step={f.step} placeholder={f.placeholder}
                  className="w-full bg-gray-700 text-white rounded-lg px-3 py-2 text-sm border border-gray-600 focus:border-blue-500 focus:outline-none"/>
              </div>
            ))}
          </div>
          <div>
            <label className="text-gray-400 text-xs mb-2 block">ルールチェック</label>
            <div className="space-y-2">
              {POKER_RULES.map(r=>(
                <label key={r.key} className="flex items-center gap-2 cursor-pointer">
                  <input type="checkbox" checked={form[r.key]} onChange={e=>set(r.key,e.target.checked)}
                    className="w-4 h-4 rounded accent-emerald-500"/>
                  <span className={`text-sm ${form[r.key]?'text-gray-200':'text-red-400'}`}>{r.label}</span>
                </label>
              ))}
            </div>
          </div>
          <div>
            <label className="text-gray-400 text-xs mb-1 block">メモ</label>
            <textarea value={form.notes} onChange={e=>set('notes',e.target.value)} rows={2} placeholder="気づき・反省点など"
              className="w-full bg-gray-700 text-white rounded-lg px-3 py-2 text-sm border border-gray-600 focus:border-blue-500 focus:outline-none resize-none"/>
          </div>
          <div className="flex gap-2 justify-end">
            <button onClick={onCancel} className="px-4 py-2 text-gray-400 hover:text-white text-sm">キャンセル</button>
            <button onClick={submit} className="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-5 py-2 rounded-lg text-sm">
              {isEdit?'保存':'登録'}
            </button>
          </div>
        </div>
      );
    };

    const POKER_DAILY_TODOS = [
      { key:'hands30', label:'毎日30ハンドプレイする',  auto:true },
      { key:'gto',     label:'1ハンドGTO分析する',       auto:false },
    ];

    const PokerPage = ({ sessions, checkins, handReviews, onAdd, onUpdate, onDelete, onCheckin, onAddHand, onUpdateHand, onDeleteHand }) => {
      const [pokerTab, setPokerTab] = useState('sessions');
      const [showForm, setShowForm] = useState(false);
      const [editing,  setEditing]  = useState(null);
      const [deleting, setDeleting] = useState(null);
      const [calMonth, setCalMonth] = useState(thisMonth());

      const monthSessions  = useMemo(()=>sessions.filter(s=>s.date.startsWith(calMonth)),[sessions,calMonth]);
      const totalCompliant = monthSessions.filter(s=>s.ruleNoEmotion&&s.ruleStopTilted&&s.ruleNoRandomCalls).length;
      const complianceRate = monthSessions.length>0 ? totalCompliant/monthSessions.length*100 : null;
      const totalBb  = monthSessions.reduce((s,x)=>s+x.resultBb,0);
      const totalUsd = monthSessions.reduce((s,x)=>s+x.resultBb*x.bbSize,0);

      // All-time totals
      const allHandsTotal = sessions.reduce((s,x)=>s+x.hands,0);
      const allBbTotal    = sessions.reduce((s,x)=>s+x.resultBb,0);
      const allUsdTotal   = sessions.reduce((s,x)=>s+x.resultBb*x.bbSize,0);

      // Today's TODO
      const todayHandsCount = sessions.filter(s=>s.date===todayStr()).reduce((s,x)=>s+x.hands,0);
      const todayCheckin    = checkins[todayStr()] || {};
      const todayTodos = [
        { key:'hands30', done: todayHandsCount>=30, auto:true,  label:'毎日30ハンドプレイする', detail:`今日: ${todayHandsCount}/30 hands` },
        { key:'gto',     done: !!todayCheckin.todoGto, auto:false, label:'1ハンドGTO分析する' },
      ];

      // Monthly TODO completion rate
      const monthDates      = [...new Set(monthSessions.map(s=>s.date))];
      const completedDays   = monthDates.filter(date=>{
        const dayHands = sessions.filter(s=>s.date===date).reduce((s,x)=>s+x.hands,0);
        return dayHands>=30 && (checkins[date]||{}).todoGto;
      }).length;
      const todoRate = monthDates.length>0 ? completedDays/monthDates.length*100 : null;

      const monthOpts = useMemo(()=>{
        const s=new Set([thisMonth()]); sessions.forEach(x=>s.add(x.date.slice(0,7)));
        return [...s].sort().reverse();
      },[sessions]);

      const handleSave = async (data) => {
        if (editing) { await onUpdate(data); setEditing(null); }
        else { await onAdd(data); setShowForm(false); }
      };
      const handleGtoToggle = async () => {
        await onCheckin({ date: todayStr(), todoGto: !todayCheckin.todoGto });
      };

      const kpiCards = [
        { label:'ルール遵守率', value: complianceRate!==null?`${complianceRate.toFixed(1)}%`:'—',
          target:'100%', good:complianceRate===100, warn:complianceRate!==null&&complianceRate>=66,
          sub: monthSessions.length>0?`${totalCompliant}/${monthSessions.length} セッション`:'' },
        { label:'TODO達成率', value: todoRate!==null?`${todoRate.toFixed(1)}%`:'—',
          target:'100%', good:todoRate===100, warn:todoRate!==null&&todoRate>=50,
          sub: monthDates.length>0?`${completedDays}/${monthDates.length} 日達成`:'' },
        { label:'月次収支 (BB)', value: monthSessions.length>0?`${totalBb>=0?'+':''}${totalBb.toFixed(1)} BB`:'—',
          target:'プラス維持', good:totalBb>0, warn:totalBb===0, sub:`${monthSessions.length} セッション` },
        { label:'月次収支 ($)', value: monthSessions.length>0?(totalUsd>=0?`+$${totalUsd.toFixed(2)}`:`-$${Math.abs(totalUsd).toFixed(2)}`): '—',
          target:'プラス維持', good:totalUsd>0, warn:totalUsd===0,
          sub: monthSessions.length>0?`平均BB: $${(monthSessions.reduce((s,x)=>s+x.bbSize,0)/monthSessions.length).toFixed(2)}`:'' },
      ];

      return (
        <div className="space-y-4">
          {/* Poker sub-tabs */}
          <div className="flex gap-2">
            {[{key:'sessions',label:'📋 セッション'},{key:'hands',label:'🎴 ハンドレビュー'}].map(t=>(
              <button key={t.key} onClick={()=>setPokerTab(t.key)}
                className={`px-4 py-2 rounded-lg text-sm font-medium transition-colors ${pokerTab===t.key?'bg-purple-600 text-white':'bg-gray-800 text-gray-400 hover:text-white'}`}>
                {t.label}
              </button>
            ))}
          </div>

          {pokerTab==='hands'&&<HandReviewPage reviews={handReviews} onAdd={onAddHand} onUpdate={onUpdateHand} onDelete={onDeleteHand}/>}
          {pokerTab==='sessions'&&<div className="space-y-6">
          <div className="flex items-center justify-between gap-4 flex-wrap">
            <div>
              <h2 className="text-white font-bold text-lg">🃏 Poker</h2>
              <p className="text-gray-500 text-xs mt-0.5">セッション管理 ＆ KPI</p>
            </div>
            <div className="flex items-center gap-3">
              <select value={calMonth} onChange={e=>setCalMonth(e.target.value)}
                className="bg-gray-800 text-white rounded-lg px-3 py-1.5 text-sm border border-gray-700 focus:border-blue-500 focus:outline-none">
                {monthOpts.map(m=><option key={m} value={m}>{m}</option>)}
              </select>
              <button onClick={()=>{setShowForm(true);setEditing(null);}}
                className="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-4 py-2 rounded-lg text-sm">＋ 登録</button>
            </div>
          </div>

          {/* Today's Daily TODO */}
          <div className="bg-gray-900 border border-gray-700 rounded-xl p-4">
            <h3 className="text-gray-300 font-semibold text-xs uppercase tracking-widest mb-3">
              ✅ 今日のデイリーTODO — {todayStr()}
            </h3>
            <div className="space-y-2">
              {todayTodos.map(t=>(
                <div key={t.key} className="flex items-center gap-3">
                  {t.auto
                    ? <span className={`w-5 h-5 rounded flex items-center justify-center text-xs flex-shrink-0 ${t.done?'bg-emerald-600 text-white':'bg-gray-700 text-gray-500'}`}>{t.done?'✓':'○'}</span>
                    : <button onClick={handleGtoToggle}
                        className={`w-5 h-5 rounded flex items-center justify-center text-xs flex-shrink-0 transition-colors ${t.done?'bg-emerald-600 text-white hover:bg-emerald-500':'bg-gray-700 text-gray-500 hover:bg-gray-600'}`}>
                        {t.done?'✓':'○'}
                      </button>
                  }
                  <span className={`text-sm ${t.done?'text-gray-200':'text-gray-500'}`}>{t.label}</span>
                  {t.detail&&<span className="text-xs text-gray-600 ml-1">{t.detail}</span>}
                  {t.auto&&<span className="text-xs text-gray-700">（自動）</span>}
                  {!t.auto&&<span className="text-xs text-gray-700">（クリックで切替）</span>}
                </div>
              ))}
            </div>
          </div>

          {/* Rules + TODO */}
          <div className="bg-gray-800/60 border border-gray-700 rounded-xl p-4 grid sm:grid-cols-2 gap-4">
            <div>
              <h3 className="text-gray-300 font-semibold text-xs uppercase tracking-widest mb-3">📋 ポーカー ルール</h3>
              <div className="space-y-1.5">
                {POKER_RULES.map((r,i)=>(
                  <div key={r.key} className="flex items-start gap-2 text-sm text-gray-300">
                    <span className="text-emerald-400 font-bold text-xs mt-0.5">{i+1}.</span>{r.label}
                  </div>
                ))}
              </div>
            </div>
            <div>
              <h4 className="text-gray-300 font-semibold text-xs uppercase tracking-widest mb-3">📌 TODO（週次）</h4>
              <ul className="space-y-1 text-xs text-gray-400 list-disc list-inside">
                <li>プリフロップ範囲をスタディする（週1回以上）</li>
                <li>セッション後に振り返りメモを書く</li>
                <li>ハンドヒストリーを確認してリーク箇所を特定する</li>
              </ul>
            </div>
          </div>

          {/* All-time totals */}
          <div className="grid grid-cols-3 gap-4">
            {[
              { label:'累計ハンド数', value:`${allHandsTotal.toLocaleString()} hands`, sub:`${sessions.length} セッション`, color:'text-white' },
              { label:'累計収支 (BB)', value:`${allBbTotal>=0?'+':''}${allBbTotal.toFixed(1)} BB`, sub:'全期間合計', color:allBbTotal>=0?'text-emerald-400':'text-red-400' },
              { label:'累計収支 ($)',  value:allUsdTotal>=0?`+$${allUsdTotal.toFixed(2)}`:`-$${Math.abs(allUsdTotal).toFixed(2)}`, sub:'全期間合計', color:allUsdTotal>=0?'text-emerald-400':'text-red-400' },
            ].map(c=>(
              <div key={c.label} className="bg-gray-800/40 rounded-xl p-4 border border-gray-700">
                <div className="text-gray-500 text-xs mb-1">{c.label}</div>
                <div className={`text-xl font-bold font-mono ${c.color}`}>{c.value}</div>
                <div className="text-gray-600 text-xs mt-1">{c.sub}</div>
              </div>
            ))}
          </div>

          {/* KPI */}
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
            {kpiCards.map(c=>{
              const hasData = monthSessions.length>0;
              const border = c.good?'border-emerald-500':c.warn?'border-yellow-500':hasData?'border-red-500':'border-gray-700';
              const textColor = c.good?'text-emerald-400':c.warn?'text-yellow-400':hasData?'text-red-400':'text-gray-400';
              const icon = c.good?'✅':c.warn?'⚠️':hasData?'🚨':'—';
              return (
                <div key={c.label} className={`bg-gray-800 rounded-xl p-4 border-l-4 ${border}`}>
                  <div className="flex items-start justify-between mb-2">
                    <span className="text-gray-400 text-xs">{c.label}</span>
                    <span className="text-base">{icon}</span>
                  </div>
                  <div className={`text-2xl font-bold font-mono ${textColor}`}>{c.value}</div>
                  <div className="text-gray-500 text-xs mt-1">目標: {c.target}</div>
                  {c.sub&&<div className="text-gray-600 text-xs">{c.sub}</div>}
                </div>
              );
            })}
          </div>

          {/* Form */}
          {(showForm||editing)&&(
            <PokerSessionForm session={editing} onSave={handleSave}
              onCancel={()=>{setShowForm(false);setEditing(null);}}/>
          )}

          {/* Session list */}
          <div className="bg-gray-800 rounded-xl overflow-hidden">
            <div className="px-4 py-3 border-b border-gray-700">
              <h3 className="text-white font-semibold text-sm">{calMonth} のセッション ({monthSessions.length})</h3>
            </div>
            {monthSessions.length===0
              ? <div className="p-8 text-center text-gray-600 text-sm">この月のセッションはありません</div>
              : <div className="divide-y divide-gray-700">
                  {[...monthSessions].sort((a,b)=>b.date.localeCompare(a.date)).map(s=>{
                    const usd = s.resultBb*s.bbSize;
                    const allOk = s.ruleNoEmotion&&s.ruleStopTilted&&s.ruleNoRandomCalls;
                    return (
                      <div key={s.id} className="px-4 py-3 hover:bg-gray-700/30 transition-colors">
                        <div className="flex items-center gap-3 flex-wrap">
                          <span className="text-gray-400 text-xs font-mono w-24">{fmtDate(s.date)}</span>
                          <span className="text-gray-300 text-xs">{s.hands} hands ｜ BB: ${s.bbSize}</span>
                          <span className={`font-bold font-mono text-sm ${s.resultBb>0?'text-emerald-400':s.resultBb<0?'text-red-400':'text-gray-400'}`}>
                            {s.resultBb>0?'+':''}{s.resultBb.toFixed(1)} BB
                          </span>
                          <span className={`font-mono text-xs ${usd>0?'text-emerald-300':usd<0?'text-red-300':'text-gray-500'}`}>
                            ({usd>=0?'+':''}{usd.toFixed(2)}$)
                          </span>
                          <span className={`text-xs px-2 py-0.5 rounded-full ${allOk?'bg-emerald-900/60 text-emerald-300':'bg-red-900/60 text-red-300'}`}>
                            {allOk?'✓ ルール遵守':'✗ 違反あり'}
                          </span>
                          {!allOk&&<span className="text-red-400 text-xs">
                            {[!s.ruleNoEmotion&&'感情的',!s.ruleStopTilted&&'離席失敗',!s.ruleNoRandomCalls&&'適当コール'].filter(Boolean).join(' / ')}
                          </span>}
                          <div className="ml-auto flex gap-2">
                            <button onClick={()=>{setEditing(s);setShowForm(false);}} className="text-gray-500 hover:text-blue-400 text-xs px-2 py-1">編集</button>
                            <button onClick={()=>setDeleting(s.id)} className="text-gray-500 hover:text-red-400 text-xs px-2 py-1">削除</button>
                          </div>
                        </div>
                        {s.notes&&<div className="text-gray-600 text-xs mt-1 ml-24 truncate">{s.notes}</div>}
                      </div>
                    );
                  })}
                </div>
            }
          </div>

          {/* Delete confirm */}
          {deleting&&(
            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
              <div className="bg-gray-800 rounded-xl p-6 space-y-4 max-w-sm w-full">
                <h3 className="text-white font-bold">削除確認</h3>
                <p className="text-gray-400 text-sm">このセッションを削除しますか？</p>
                <div className="flex gap-3 justify-end">
                  <button onClick={()=>setDeleting(null)} className="text-gray-400 hover:text-white px-4 py-2 text-sm">キャンセル</button>
                  <button onClick={()=>{onDelete(deleting);setDeleting(null);}} className="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-lg text-sm font-bold">削除</button>
                </div>
              </div>
            </div>
          )}
          </div>}
        </div>
      );
    };

    // ══════════════════════════════════════════════════════════════════════
    // PREDICTION MARKET PAGE
    // ══════════════════════════════════════════════════════════════════════
    const PREDICT_RULES = [
      { key:'rulePositiveEv',  label:'期待値がプラスのベットをした', auto:false },
      { key:'ruleUsedEvCalc',  label:'ベットの前にAI等を使った期待値計算を実施した', auto:false },
      { key:'ruleBetUnder20',  label:'一回のベット額20ドル未満', auto:true },
    ];
    const PREDICT_CATEGORIES = ['スポーツ','政治','経済','テクノロジー','エンタメ','その他'];

    const PredictionBetForm = ({ bet, onSave, onCancel }) => {
      const isEdit = !!bet;
      const [form, setForm] = useState(bet || {
        date:todayStr(), category:'スポーツ', title:'', betAmount:'', resultUsd:'',
        rulePositiveEv:true, ruleUsedEvCalc:true, notes:'',
      });
      const set = (k,v) => setForm(f=>({...f,[k]:v}));
      const betUnder20 = parseFloat(form.betAmount||0) < 20;
      const isPending = form.resultUsd === '' || form.resultUsd === null || form.resultUsd === undefined;
      const submit = () => {
        if (!form.date||!form.title||form.betAmount==='') {
          alert('日付・タイトル・ベット額を入力してください'); return;
        }
        onSave({
          ...form, id:form.id||uid(),
          betAmount: parseFloat(form.betAmount)||0,
          resultUsd: isPending ? null : parseFloat(form.resultUsd),
        });
      };
      return (
        <div className="bg-gray-800 rounded-xl p-5 space-y-4 slide-in">
          <h3 className="text-white font-bold text-sm">{isEdit?'✏️ 編集':'➕ ベット登録'}</h3>
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
            <div>
              <label className="text-gray-400 text-xs mb-1 block">日付</label>
              <input type="date" value={form.date} onChange={e=>set('date',e.target.value)}
                className="w-full bg-gray-700 text-white rounded-lg px-3 py-2 text-sm border border-gray-600 focus:border-blue-500 focus:outline-none"/>
            </div>
            <div>
              <label className="text-gray-400 text-xs mb-1 block">カテゴリ</label>
              <select value={form.category} onChange={e=>set('category',e.target.value)}
                className="w-full bg-gray-700 text-white rounded-lg px-3 py-2 text-sm border border-gray-600 focus:border-blue-500 focus:outline-none">
                {PREDICT_CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div>
              <label className="text-gray-400 text-xs mb-1 block">ベット額 ($)</label>
              <input type="number" value={form.betAmount} onChange={e=>set('betAmount',e.target.value)} step="0.01" min="0" placeholder="10.00"
                className={`w-full bg-gray-700 text-white rounded-lg px-3 py-2 text-sm border focus:outline-none ${betUnder20?'border-gray-600 focus:border-blue-500':'border-red-600 focus:border-red-500'}`}/>
              {!betUnder20&&<p className="text-red-400 text-xs mt-0.5">⚠️ 20ドル以上はルール違反</p>}
            </div>
            <div>
              <label className="text-gray-400 text-xs mb-1 block">
                勝敗 ($) — 負は− <span className="text-gray-600">（空欄=ベット中）</span>
              </label>
              <input type="number" value={form.resultUsd ?? ''} onChange={e=>set('resultUsd',e.target.value)} step="0.01" placeholder="空欄でベット中"
                className={`w-full rounded-lg px-3 py-2 text-sm border focus:outline-none ${isPending?'bg-amber-900/30 border-amber-600 text-amber-200 placeholder-amber-700 focus:border-amber-400':'bg-gray-700 border-gray-600 text-white focus:border-blue-500'}`}/>
              {isPending&&<p className="text-amber-500 text-xs mt-0.5">🎯 ベット中として登録されます</p>}
            </div>
          </div>
          <div>
            <label className="text-gray-400 text-xs mb-1 block">タイトル</label>
            <input type="text" value={form.title} onChange={e=>set('title',e.target.value)} placeholder="例: チャンピオンズリーグ決勝 マンC vs レアル"
              className="w-full bg-gray-700 text-white rounded-lg px-3 py-2 text-sm border border-gray-600 focus:border-blue-500 focus:outline-none"/>
          </div>
          <div>
            <label className="text-gray-400 text-xs mb-2 block">ルールチェック</label>
            <div className="space-y-2">
              {PREDICT_RULES.filter(r=>!r.auto).map(r=>(
                <label key={r.key} className="flex items-center gap-2 cursor-pointer">
                  <input type="checkbox" checked={form[r.key]} onChange={e=>set(r.key,e.target.checked)} className="w-4 h-4 rounded accent-emerald-500"/>
                  <span className={`text-sm ${form[r.key]?'text-gray-200':'text-red-400'}`}>{r.label}</span>
                </label>
              ))}
              <div className="flex items-center gap-2 opacity-70">
                <span className={`w-4 h-4 rounded text-xs flex items-center justify-center flex-shrink-0 ${betUnder20?'bg-emerald-700 text-white':'bg-red-900 text-red-300'}`}>{betUnder20?'✓':'✗'}</span>
                <span className={`text-sm ${betUnder20?'text-gray-400':'text-red-400'}`}>一回のベット額20ドル未満（自動: ${parseFloat(form.betAmount||0).toFixed(2)}）</span>
              </div>
            </div>
          </div>
          <div>
            <label className="text-gray-400 text-xs mb-1 block">メモ</label>
            <textarea value={form.notes} onChange={e=>set('notes',e.target.value)} rows={2} placeholder="根拠・分析メモなど"
              className="w-full bg-gray-700 text-white rounded-lg px-3 py-2 text-sm border border-gray-600 focus:border-blue-500 focus:outline-none resize-none"/>
          </div>
          <div className="flex gap-2 justify-end">
            <button onClick={onCancel} className="px-4 py-2 text-gray-400 hover:text-white text-sm">キャンセル</button>
            <button onClick={submit} className="bg-cyan-600 hover:bg-cyan-500 text-white font-bold px-5 py-2 rounded-lg text-sm">{isEdit?'保存':'登録'}</button>
          </div>
        </div>
      );
    };

    const PredictionPage = ({ bets, onAdd, onUpdate, onDelete }) => {
      const [showForm, setShowForm] = useState(false);
      const [editing,  setEditing]  = useState(null);
      const [deleting, setDeleting] = useState(null);
      const [calMonth, setCalMonth] = useState(thisMonth());

      const monthBets     = useMemo(()=>bets.filter(b=>b.date.startsWith(calMonth)),[bets,calMonth]);
      const pendingBets   = monthBets.filter(b=>b.resultUsd===null||b.resultUsd===undefined);
      const settledBets   = monthBets.filter(b=>b.resultUsd!==null&&b.resultUsd!==undefined);
      const isCompliant   = (b) => b.rulePositiveEv && b.ruleUsedEvCalc && b.betAmount < 20;
      const compliantCount  = monthBets.filter(isCompliant).length;
      const complianceRate  = monthBets.length>0 ? compliantCount/monthBets.length*100 : null;
      const totalResult     = settledBets.reduce((s,b)=>s+b.resultUsd,0);
      const totalBet        = monthBets.reduce((s,b)=>s+b.betAmount,0);
      const settledBet      = settledBets.reduce((s,b)=>s+b.betAmount,0);
      const winCount        = settledBets.filter(b=>b.resultUsd>0).length;
      const winRate         = settledBets.length>0 ? winCount/settledBets.length*100 : null;
      const allTimeResult   = bets.filter(b=>b.resultUsd!==null&&b.resultUsd!==undefined).reduce((s,b)=>s+b.resultUsd,0);
      const allTimeBet      = bets.reduce((s,b)=>s+b.betAmount,0);

      const monthOpts = useMemo(()=>{
        const s=new Set([thisMonth()]); bets.forEach(b=>s.add(b.date.slice(0,7)));
        return [...s].sort().reverse();
      },[bets]);

      const handleSave = async (data) => {
        if (editing) { await onUpdate(data); setEditing(null); }
        else { await onAdd(data); setShowForm(false); }
      };

      const kpiCards = [
        { label:'ルール遵守率', value:complianceRate!==null?`${complianceRate.toFixed(1)}%`:'—',
          target:'100%', good:complianceRate===100, warn:complianceRate!==null&&complianceRate>=80,
          sub:monthBets.length>0?`${compliantCount}/${monthBets.length} ベット`:'' },
        { label:'月次収支 ($)', value:settledBets.length>0?(totalResult>=0?`+$${totalResult.toFixed(2)}`:`-$${Math.abs(totalResult).toFixed(2)}`):'—',
          target:'プラス維持', good:totalResult>0, warn:totalResult===0,
          sub:settledBets.length>0?`確定: $${settledBet.toFixed(2)} / 保留中: $${(totalBet-settledBet).toFixed(2)}`:'' },
        { label:'勝率', value:winRate!==null?`${winRate.toFixed(1)}%`:'—',
          target:'50%以上', good:winRate!==null&&winRate>=50, warn:winRate!==null&&winRate>=40,
          sub:settledBets.length>0?`${winCount}勝 ${settledBets.length-winCount}負 (確定のみ)`:'' },
      ];

      return (
        <div className="space-y-6">
          <div className="flex items-center justify-between gap-4 flex-wrap">
            <div>
              <h2 className="text-white font-bold text-lg">🔮 予測市場</h2>
              <p className="text-gray-500 text-xs mt-0.5">ベット管理 ＆ KPI</p>
            </div>
            <div className="flex items-center gap-3">
              <select value={calMonth} onChange={e=>setCalMonth(e.target.value)}
                className="bg-gray-800 text-white rounded-lg px-3 py-1.5 text-sm border border-gray-700 focus:border-blue-500 focus:outline-none">
                {monthOpts.map(m=><option key={m} value={m}>{m}</option>)}
              </select>
              <button onClick={()=>{setShowForm(true);setEditing(null);}}
                className="bg-cyan-600 hover:bg-cyan-500 text-white font-bold px-4 py-2 rounded-lg text-sm">＋ 登録</button>
            </div>
          </div>

          {/* Rules + TODO */}
          <div className="bg-gray-800/60 border border-gray-700 rounded-xl p-4 grid sm:grid-cols-2 gap-4">
            <div>
              <h3 className="text-gray-300 font-semibold text-xs uppercase tracking-widest mb-3">📋 予測市場 ルール</h3>
              <div className="space-y-1.5">
                {PREDICT_RULES.map((r,i)=>(
                  <div key={r.key} className="flex items-start gap-2 text-sm text-gray-300">
                    <span className="text-cyan-400 font-bold text-xs mt-0.5">{i+1}.</span>
                    {r.label}{r.auto&&<span className="text-xs text-gray-600">（自動判定）</span>}
                  </div>
                ))}
              </div>
            </div>
            <div>
              <h4 className="text-gray-300 font-semibold text-xs uppercase tracking-widest mb-3">📌 TODO</h4>
              <ul className="space-y-1 text-xs text-gray-400 list-disc list-inside">
                <li>各ベット前にAIで期待値を計算する</li>
                <li>過去ベットの結果を月次で振り返る</li>
                <li>カテゴリ別の勝率を分析してエッジを特定する</li>
              </ul>
            </div>
          </div>

          {/* All-time totals */}
          <div className="grid grid-cols-3 gap-4">
            {[
              { label:'累計ベット数',  value:`${bets.length} ベット`,  sub:`${new Set(bets.map(b=>b.category)).size} カテゴリ`, color:'text-white' },
              { label:'累計収支 ($)',  value:allTimeResult>=0?`+$${allTimeResult.toFixed(2)}`:`-$${Math.abs(allTimeResult).toFixed(2)}`, sub:`総ベット: $${allTimeBet.toFixed(2)}（確定分のみ）`, color:allTimeResult>=0?'text-emerald-400':'text-red-400' },
              { label:'累計 ROI',  value:allTimeBet>0?`${((allTimeResult/allTimeBet)*100).toFixed(1)}%`:'—', sub:`ベット中: ${bets.filter(b=>b.resultUsd===null||b.resultUsd===undefined).length}件`, color:allTimeResult>=0?'text-emerald-400':'text-red-400' },
            ].map(c=>(
              <div key={c.label} className="bg-gray-800/40 rounded-xl p-4 border border-gray-700">
                <div className="text-gray-500 text-xs mb-1">{c.label}</div>
                <div className={`text-xl font-bold font-mono ${c.color}`}>{c.value}</div>
                <div className="text-gray-600 text-xs mt-1">{c.sub}</div>
              </div>
            ))}
          </div>

          {/* KPI */}
          <div className="grid grid-cols-3 gap-4">
            {kpiCards.map(c=>{
              const hasData = monthBets.length>0;
              const border = c.good?'border-emerald-500':c.warn?'border-yellow-500':hasData?'border-red-500':'border-gray-700';
              const textColor = c.good?'text-emerald-400':c.warn?'text-yellow-400':hasData?'text-red-400':'text-gray-400';
              const icon = c.good?'✅':c.warn?'⚠️':hasData?'🚨':'—';
              return (
                <div key={c.label} className={`bg-gray-800 rounded-xl p-4 border-l-4 ${border}`}>
                  <div className="flex items-start justify-between mb-2">
                    <span className="text-gray-400 text-xs">{c.label}</span>
                    <span className="text-base">{icon}</span>
                  </div>
                  <div className={`text-2xl font-bold font-mono ${textColor}`}>{c.value}</div>
                  <div className="text-gray-500 text-xs mt-1">目標: {c.target}</div>
                  {c.sub&&<div className="text-gray-600 text-xs">{c.sub}</div>}
                </div>
              );
            })}
          </div>

          {/* Form */}
          {(showForm||editing)&&(
            <PredictionBetForm bet={editing} onSave={handleSave}
              onCancel={()=>{setShowForm(false);setEditing(null);}}/>
          )}

          {/* Bet list */}
          <div className="bg-gray-800 rounded-xl overflow-hidden">
            <div className="px-4 py-3 border-b border-gray-700 flex items-center gap-3">
              <h3 className="text-white font-semibold text-sm">{calMonth} のベット ({monthBets.length})</h3>
              {pendingBets.length>0&&(
                <span className="bg-amber-500/20 border border-amber-500/40 text-amber-400 text-xs px-2 py-0.5 rounded-full font-medium">
                  🎯 ベット中 {pendingBets.length}件
                </span>
              )}
            </div>
            {monthBets.length===0
              ? <div className="p-8 text-center text-gray-600 text-sm">この月のベットはありません</div>
              : <div className="divide-y divide-gray-700">
                  {[...monthBets].sort((a,b)=>{
                    const aP = a.resultUsd===null||a.resultUsd===undefined;
                    const bP = b.resultUsd===null||b.resultUsd===undefined;
                    if(aP!==bP) return aP?-1:1;
                    return b.date.localeCompare(a.date);
                  }).map(b=>{
                    const isPending = b.resultUsd===null||b.resultUsd===undefined;
                    const ok  = isCompliant(b);
                    const roi = !isPending && b.betAmount>0 ? (b.resultUsd/b.betAmount*100) : null;
                    return (
                      <div key={b.id} className={`px-4 py-3 transition-colors ${isPending?'bg-amber-950/20 hover:bg-amber-950/30':'hover:bg-gray-700/30'}`}>
                        <div className="flex items-center gap-3 flex-wrap">
                          <span className="text-gray-400 text-xs font-mono w-24">{fmtDate(b.date)}</span>
                          <span className="bg-gray-700 text-gray-300 text-xs px-2 py-0.5 rounded">{b.category}</span>
                          <span className="text-gray-200 text-xs flex-1 min-w-32 truncate">{b.title}</span>
                          <span className="text-gray-400 text-xs font-mono">ベット: ${b.betAmount.toFixed(2)}</span>
                          {isPending
                            ? <span className="bg-amber-500 text-gray-900 font-bold text-xs px-3 py-0.5 rounded-full animate-pulse">🎯 ベット中</span>
                            : <>
                                <span className={`font-bold font-mono text-sm ${b.resultUsd>0?'text-emerald-400':b.resultUsd<0?'text-red-400':'text-gray-400'}`}>
                                  {b.resultUsd>=0?'+':''}{b.resultUsd.toFixed(2)}$
                                </span>
                                <span className={`text-xs font-mono ${roi>=0?'text-emerald-300':'text-red-300'}`}>
                                  ROI: {roi>=0?'+':''}{roi.toFixed(0)}%
                                </span>
                              </>
                          }
                          <span className={`text-xs px-2 py-0.5 rounded-full ${ok?'bg-emerald-900/60 text-emerald-300':'bg-red-900/60 text-red-300'}`}>
                            {ok?'✓ 遵守':'✗ 違反'}
                          </span>
                          <div className="ml-auto flex gap-2">
                            <button onClick={()=>{setEditing({...b,resultUsd:isPending?'':b.resultUsd});setShowForm(false);}} className="text-gray-500 hover:text-blue-400 text-xs px-2 py-1">編集</button>
                            <button onClick={()=>setDeleting(b.id)} className="text-gray-500 hover:text-red-400 text-xs px-2 py-1">削除</button>
                          </div>
                        </div>
                        {b.notes&&<div className="text-gray-600 text-xs mt-1 ml-24 truncate">{b.notes}</div>}
                      </div>
                    );
                  })}
                </div>
            }
          </div>

          {/* Delete confirm */}
          {deleting&&(
            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
              <div className="bg-gray-800 rounded-xl p-6 space-y-4 max-w-sm w-full">
                <h3 className="text-white font-bold">削除確認</h3>
                <p className="text-gray-400 text-sm">このベットを削除しますか？</p>
                <div className="flex gap-3 justify-end">
                  <button onClick={()=>setDeleting(null)} className="text-gray-400 hover:text-white px-4 py-2 text-sm">キャンセル</button>
                  <button onClick={()=>{onDelete(deleting);setDeleting(null);}} className="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-lg text-sm font-bold">削除</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ══════════════════════════════════════════════════════════════════════
    // CALENDAR CHART
    // ══════════════════════════════════════════════════════════════════════
    const CalendarChart = ({ month, dayData, daysInMon, filters, graphRange, pokerSessions, trades, predictionBets }) => {
      const chartRef = useRef(null);
      const instRef  = useRef(null);
      const today    = todayStr();

      const monthlyData = useMemo(()=>{
        const cutoff = month===thisMonth() ? parseInt(today.split('-')[2]) : daysInMon;
        let cum=0; const vals=[]; const labels=[];
        for(let d=1;d<=cutoff;d++){
          const ds=`${month}-${String(d).padStart(2,'0')}`;
          const bd=dayData[ds]||{};
          const t=BUSINESSES.filter(b=>filters.has(b.key)).reduce((s,b)=>s+(bd[b.key]||0),0);
          cum+=t; vals.push(parseFloat(cum.toFixed(2))); labels.push(`${d}日`);
        }
        return {vals,labels};
      },[dayData,filters,daysInMon,month,today]);

      const alltimeData = useMemo(()=>{
        const dm={};
        const add=(d,biz,amt)=>{ if(d>today)return; if(!dm[d])dm[d]={}; dm[d][biz]=(dm[d][biz]||0)+amt; };
        pokerSessions.forEach(s=>add(s.date,'poker',s.resultBb*s.bbSize));
        trades.filter(t=>t.status!=='pending').forEach(t=>add(t.date,'invest',netPnl(t)));
        predictionBets.filter(b=>b.resultUsd!=null).forEach(b=>add(b.date,'predict',b.resultUsd));
        const dates=Object.keys(dm).sort();
        if(!dates.length) return {vals:[],labels:[]};
        let cum=0;
        const vals=dates.map(d=>{
          const t=BUSINESSES.filter(b=>filters.has(b.key)).reduce((s,b)=>s+(dm[d][b.key]||0),0);
          cum+=t; return parseFloat(cum.toFixed(2));
        });
        return {vals,labels:dates.map(d=>d.slice(5))};
      },[pokerSessions,trades,predictionBets,filters,today]);

      const cd = graphRange==='alltime' ? alltimeData : monthlyData;

      useEffect(()=>{
        if(!chartRef.current||!cd.vals.length){if(instRef.current){instRef.current.destroy();instRef.current=null;}return;}
        if(instRef.current) instRef.current.destroy();
        instRef.current=new Chart(chartRef.current,{
          type:'line',
          data:{labels:cd.labels,datasets:[{
            data:cd.vals, borderWidth:2, pointRadius:2, pointHoverRadius:4, fill:true, tension:0.3,
            segment:{borderColor:ctx=>cd.vals[ctx.p1DataIndex]>=0?'#34d399':'#f87171'},
            backgroundColor:ctx=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,ctx.chart.height);g.addColorStop(0,'rgba(96,165,250,0.25)');g.addColorStop(1,'rgba(96,165,250,0)');return g;},
          }]},
          options:{
            responsive:true,maintainAspectRatio:false,
            plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`$${c.parsed.y.toFixed(2)}`}}},
            scales:{
              x:{ticks:{color:'#6b7280',font:{size:10},maxTicksLimit:20},grid:{color:'rgba(255,255,255,0.04)'}},
              y:{ticks:{color:'#6b7280',font:{size:10},callback:v=>`$${v.toFixed(0)}`},grid:{color:'rgba(255,255,255,0.06)'},
                afterDataLimits:s=>{const p=Math.abs(s.max-s.min)*0.1||5;s.max+=p;s.min-=p;}}
            }
          }
        });
        return ()=>{if(instRef.current)instRef.current.destroy();};
      },[cd]);

      const last=cd.vals[cd.vals.length-1]||0;
      return (
        <div className="bg-gray-800 rounded-xl p-4">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-white font-semibold text-sm">📈 累計損益推移</h3>
            <span className={`font-bold font-mono text-sm ${last>=0?'text-emerald-400':'text-red-400'}`}>{last>=0?'+':''}{last.toFixed(2)}$</span>
          </div>
          <div style={{height:'140px'}}>
            {cd.vals.length>0
              ? <canvas ref={chartRef}/>
              : <div className="flex items-center justify-center h-full text-gray-600 text-sm">データがありません</div>}
          </div>
        </div>
      );
    };

    // ══════════════════════════════════════════════════════════════════════
    // CALENDAR PAGE
    // ══════════════════════════════════════════════════════════════════════
    const BUSINESSES = [
      {key:'poker',   label:'🃏 Poker',    textPos:'text-purple-300', textNeg:'text-purple-400', bg:'bg-purple-900/40'},
      {key:'invest',  label:'📈 投資',      textPos:'text-blue-300',   textNeg:'text-blue-400',   bg:'bg-blue-900/40'},
      {key:'keiba',   label:'🐎 競馬',      textPos:'text-orange-300', textNeg:'text-orange-400', bg:'bg-orange-900/40'},
      {key:'predict', label:'🔮 予測市場',  textPos:'text-cyan-300',   textNeg:'text-cyan-400',   bg:'bg-cyan-900/40'},
      {key:'toreka',  label:'🃠 トレカ',    textPos:'text-yellow-300', textNeg:'text-yellow-400', bg:'bg-yellow-900/40'},
    ];

    const CalendarPage = ({ pokerSessions, trades, predictionBets }) => {
      const [month,       setMonth]       = useState(thisMonth());
      const [filters,     setFilters]     = useState(new Set(['poker','invest','keiba','predict','toreka']));
      const [selectedDay, setSelectedDay] = useState(null);
      const [graphRange,  setGraphRange]  = useState('monthly');

      const toggleFilter = (key) => setFilters(f=>{const n=new Set(f);n.has(key)?n.delete(key):n.add(key);return n;});

      const dayData = useMemo(()=>{
        const data={};
        const add=(date,biz,amt)=>{if(!data[date])data[date]={};data[date][biz]=(data[date][biz]||0)+amt;};
        pokerSessions.filter(s=>s.date.startsWith(month)).forEach(s=>add(s.date,'poker',s.resultBb*s.bbSize));
        trades.filter(t=>t.date.startsWith(month)&&t.status!=='pending').forEach(t=>add(t.date,'invest',netPnl(t)));
        predictionBets.filter(b=>b.date.startsWith(month)&&b.resultUsd!==null&&b.resultUsd!==undefined).forEach(b=>add(b.date,'predict',b.resultUsd));
        return data;
      },[pokerSessions,trades,predictionBets,month]);

      const [year,mon] = month.split('-').map(Number);
      const firstDay   = new Date(year,mon-1,1).getDay();
      const daysInMon  = new Date(year,mon,0).getDate();
      const cells = [];
      for(let i=0;i<firstDay;i++) cells.push(null);
      for(let d=1;d<=daysInMon;d++) cells.push(d);

      const getDayStr = (d) => `${month}-${String(d).padStart(2,'0')}`;
      const getMonthTotal = (biz) => Object.values(dayData).reduce((s,bd)=>s+(bd[biz]||0),0);

      const monthOpts = useMemo(()=>{
        const s=new Set([thisMonth()]);
        pokerSessions.forEach(x=>s.add(x.date.slice(0,7)));
        trades.forEach(x=>s.add(x.date.slice(0,7)));
        predictionBets.forEach(x=>s.add(x.date.slice(0,7)));
        return [...s].sort().reverse();
      },[pokerSessions,trades,predictionBets]);

      const selectedDateStr = selectedDay ? getDayStr(selectedDay) : null;
      const selectedData    = selectedDateStr ? dayData[selectedDateStr] : null;

      return (
        <div className="space-y-6">
          <div className="flex items-center justify-between gap-4 flex-wrap">
            <div>
              <h2 className="text-white font-bold text-lg">📅 カレンダー</h2>
              <p className="text-gray-500 text-xs mt-0.5">月次損益カレンダー（日付をクリックで詳細）</p>
            </div>
            <div className="flex items-center gap-2">
              {/* Graph range toggle */}
              <div className="flex rounded-lg overflow-hidden border border-gray-700">
                {[{k:'monthly',l:'月次'},{k:'alltime',l:'全期間'}].map(({k,l})=>(
                  <button key={k} onClick={()=>setGraphRange(k)}
                    className={`px-3 py-1.5 text-xs font-medium transition-colors ${graphRange===k?'bg-indigo-600 text-white':'bg-gray-800 text-gray-400 hover:text-white'}`}>{l}</button>
                ))}
              </div>
              <select value={month} onChange={e=>{setMonth(e.target.value);setSelectedDay(null);}}
                className="bg-gray-800 text-white rounded-lg px-3 py-1.5 text-sm border border-gray-700 focus:border-blue-500 focus:outline-none">
              {monthOpts.map(m=><option key={m} value={m}>{m}</option>)}
              </select>
            </div>
          </div>

          {/* Filter buttons */}
          <div className="flex gap-2 flex-wrap">
            {BUSINESSES.map(b=>(
              <button key={b.key} onClick={()=>toggleFilter(b.key)}
                className={`px-3 py-1.5 rounded-full text-xs font-medium transition-colors border ${
                  filters.has(b.key)?'bg-gray-700 border-gray-500 text-white':'border-gray-700 text-gray-600 hover:text-gray-400'
                }`}>{b.label}</button>
            ))}
          </div>

          {/* Month totals bar */}
          <div className="flex gap-3 flex-wrap">
            {BUSINESSES.filter(b=>filters.has(b.key)).map(b=>{
              const total = getMonthTotal(b.key);
              const tc = total>=0?b.textPos:'text-red-400';
              return (
                <div key={b.key} className={`flex items-center gap-2 ${b.bg} rounded-lg px-3 py-2`}>
                  <span className="text-gray-400 text-xs">{b.label}</span>
                  <span className={`font-bold font-mono text-sm ${tc}`}>{total>=0?'+':''}{total.toFixed(2)}$</span>
                </div>
              );
            })}
          </div>

          {/* Cumulative P&L chart */}
          <CalendarChart
            month={month} dayData={dayData} daysInMon={daysInMon}
            filters={filters} graphRange={graphRange}
            pokerSessions={pokerSessions} trades={trades} predictionBets={predictionBets}
          />

          {/* Calendar grid */}
          <div className="bg-gray-800 rounded-xl overflow-hidden">
            <div className="grid grid-cols-7 border-b border-gray-700">
              {['日','月','火','水','木','金','土'].map((d,i)=>(
                <div key={d} className={`py-2 text-center text-xs font-medium ${i===0?'text-red-400':i===6?'text-blue-400':'text-gray-500'}`}>{d}</div>
              ))}
            </div>
            <div className="grid grid-cols-7">
              {cells.map((d,i)=>{
                if(d===null) return <div key={`e${i}`} className="min-h-20 border-r border-b border-gray-700/40"/>;
                const dateStr = getDayStr(d);
                const bd = dayData[dateStr]||{};
                const dow = i%7;
                const isToday = dateStr===todayStr();
                const isSelected = selectedDay===d;
                const activeBiz = BUSINESSES.filter(b=>filters.has(b.key)&&bd[b.key]!==undefined);
                const dayTotal  = activeBiz.reduce((s,b)=>s+(bd[b.key]||0),0);
                return (
                  <div key={d} onClick={()=>setSelectedDay(isSelected?null:d)}
                    className={`min-h-20 border-r border-b border-gray-700/40 p-1.5 cursor-pointer transition-colors
                      ${isSelected?'bg-blue-900/30':'hover:bg-gray-700/30'}`}>
                    <div className={`text-xs font-medium mb-1 w-6 h-6 flex items-center justify-center rounded-full
                      ${isToday?'bg-blue-600 text-white':dow===0?'text-red-400':dow===6?'text-blue-400':'text-gray-400'}`}>{d}</div>
                    {activeBiz.length>0&&(
                      <div className="space-y-0.5">
                        {activeBiz.map(b=>{
                          const amt=bd[b.key]||0;
                          return <div key={b.key} className={`text-xs font-mono leading-tight ${amt>=0?b.textPos:'text-red-400'}`}>
                            {amt>=0?'+':''}{amt.toFixed(1)}
                          </div>;
                        })}
                        {activeBiz.length>1&&(
                          <div className={`text-xs font-bold font-mono border-t border-gray-700/60 pt-0.5 ${dayTotal>=0?'text-white':'text-red-300'}`}>
                            ={dayTotal>=0?'+':''}{dayTotal.toFixed(1)}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Day detail */}
          {selectedDay&&(
            <div className="bg-gray-800 rounded-xl p-5 slide-in">
              <h3 className="text-white font-bold mb-4">
                {month}/{String(selectedDay).padStart(2,'0')} の詳細
              </h3>
              {selectedData&&Object.keys(selectedData).some(k=>filters.has(k)) ? (
                <div className="space-y-2">
                  {BUSINESSES.filter(b=>filters.has(b.key)&&selectedData[b.key]!==undefined).map(b=>{
                    const amt=selectedData[b.key];
                    return (
                      <div key={b.key} className="flex items-center justify-between border-b border-gray-700 pb-2">
                        <span className="text-gray-300 text-sm">{b.label}</span>
                        <span className={`font-bold font-mono text-sm ${amt>=0?b.textPos:'text-red-400'}`}>
                          {amt>=0?'+':''}{amt.toFixed(2)}$
                        </span>
                      </div>
                    );
                  })}
                  <div className="flex items-center justify-between pt-1">
                    <span className="text-gray-300 text-sm font-bold">合計</span>
                    {(()=>{
                      const total=BUSINESSES.filter(b=>filters.has(b.key)).reduce((s,b)=>s+(selectedData[b.key]||0),0);
                      return <span className={`font-bold font-mono text-base ${total>=0?'text-emerald-400':'text-red-400'}`}>{total>=0?'+':''}{total.toFixed(2)}$</span>;
                    })()}
                  </div>
                </div>
              ):(
                <p className="text-gray-600 text-sm">この日のデータはありません（フィルターを確認してください）</p>
              )}
            </div>
          )}
        </div>
      );
    };

    // ══════════════════════════════════════════════════════════════════════
    // APP
    // ══════════════════════════════════════════════════════════════════════
    const TABS = [
      {key:'dashboard',label:'📊 ダッシュボード'},
      {key:'entry',    label:'🎯 エントリー判定'},
      {key:'real',     label:'📝 トレード記録'},
      {key:'settings', label:'⚙️ 設定'},
    ];

    const SECTIONS = [
      {key:'trading', label:'📈 投資・トレード'},
      {key:'poker',   label:'🃏 Poker'},
      {key:'predict', label:'🔮 予測市場'},
      {key:'calendar',label:'📅 カレンダー'},
    ];

    const App = () => {
      const [trades,         setTrades]         = useState([]);
      const [pokerSessions,  setPokerSessions]   = useState([]);
      const [pokerCheckins,  setPokerCheckins]   = useState({});
      const [handReviews,    setHandReviews]     = useState([]);
      const [predictionBets, setPredictionBets]  = useState([]);
      const [settings,       setSettings]        = useState(DEFAULT_SETTINGS);
      const [section,        setSection]         = useState('trading');
      const [tab,            setTab]             = useState('dashboard');
      const [month,          setMonth]           = useState(thisMonth);
      const [prefill,        setPrefill]         = useState(null);
      const [loading,        setLoading]         = useState(true);
      const [error,          setError]           = useState(null);
      const [migrationPending, setMigrationPending] = useState(false);
      const [migrating,        setMigrating]        = useState(false);

      useEffect(() => {
        Promise.all([
          api.get('/api/trades'),
          api.get('/api/settings'),
          api.get('/api/poker'),
          api.get('/api/poker/checkins'),
          api.get('/api/poker/hands'),
          api.get('/api/prediction'),
        ]).then(([t, s, pk, ck, hr, pb]) => {
          setTrades(t);
          setSettings({...DEFAULT_SETTINGS, ...s});
          setPokerSessions(pk);
          const ckMap = {};
          ck.forEach(c => { ckMap[c.date] = c; });
          setPokerCheckins(ckMap);
          setHandReviews(hr);
          setPredictionBets(pb);
          setLoading(false);
          // If server has no trades yet, check for local data to migrate
          if (t.length === 0) {
            try {
              const lsReal = localStorage.getItem('tradedb_trades_v2');
              const hasLocal = lsReal && JSON.parse(lsReal).length > 0;
              if (hasLocal) setMigrationPending(true);
            } catch {}
          }
        }).catch(err => {
          console.error(err);
          setError(err.toString());
          setLoading(false);
        });
      }, []);

      const handleMigrate = async () => {
        setMigrating(true);
        try {
          const lsReal = JSON.parse(localStorage.getItem('tradedb_trades_v2') || '[]');
          const lsSettings = JSON.parse(localStorage.getItem('tradedb_settings_v2') || '{}');
          for (const t of lsReal) await api.post('/api/trades', t).catch(()=>{});
          if (Object.keys(lsSettings).length > 0) await api.post('/api/settings', lsSettings).catch(()=>{});
          const [t, s] = await Promise.all([
            api.get('/api/trades'),
            api.get('/api/settings'),
          ]);
          setTrades(t); setSettings({...DEFAULT_SETTINGS, ...s});
          setMigrationPending(false);
        } catch (e) { alert('移行中にエラーが発生しました: ' + e); }
        setMigrating(false);
      };

      const addTrade = async (trade) => {
        const newTrade = await api.post('/api/trades', trade);
        setTrades(ts => [...ts, newTrade]);
      };

      const updateTrade = async (trade) => {
        const updatedTrade = await api.put(`/api/trades/${trade.id}`, trade);
        setTrades(ts => ts.map(t => t.id === trade.id ? updatedTrade : t));
      };

      const deleteTrade = async (id) => {
        await api.del(`/api/trades/${id}`);
        setTrades(ts => ts.filter(t => t.id !== id));
      };

      const saveSettings = async (newSettings) => {
        const updatedSettings = await api.post('/api/settings', newSettings);
        setSettings({...DEFAULT_SETTINGS, ...updatedSettings});
      };

      const addPokerSession = async (session) => {
        const s = await api.post('/api/poker', session);
        setPokerSessions(ps => [...ps, s]);
      };
      const updatePokerSession = async (session) => {
        const s = await api.put(`/api/poker/${session.id}`, session);
        setPokerSessions(ps => ps.map(p => p.id===session.id ? s : p));
      };
      const deletePokerSession = async (id) => {
        await api.del(`/api/poker/${id}`);
        setPokerSessions(ps => ps.filter(p => p.id !== id));
      };
      const upsertPokerCheckin = async (data) => {
        const c = await api.post('/api/poker/checkins', data);
        setPokerCheckins(ck => ({...ck, [c.date]: c}));
      };
      const addHandReview = async (review) => {
        const r = await api.post('/api/poker/hands', review);
        setHandReviews(hrs => [...hrs, r]);
      };
      const updateHandReview = async (review) => {
        const r = await api.put(`/api/poker/hands/${review.id}`, review);
        setHandReviews(hrs => hrs.map(h => h.id===review.id ? r : h));
      };
      const deleteHandReview = async (id) => {
        await api.del(`/api/poker/hands/${id}`);
        setHandReviews(hrs => hrs.filter(h => h.id !== id));
      };
      const addPredictionBet = async (bet) => {
        const b = await api.post('/api/prediction', bet);
        setPredictionBets(bs => [...bs, b]);
      };
      const updatePredictionBet = async (bet) => {
        const b = await api.put(`/api/prediction/${bet.id}`, bet);
        setPredictionBets(bs => bs.map(x => x.id===bet.id ? b : x));
      };
      const deletePredictionBet = async (id) => {
        await api.del(`/api/prediction/${id}`);
        setPredictionBets(bs => bs.filter(x => x.id !== id));
      };
      
      const realMetrics = useMemo(()=>calcMetrics(trades, settings.initialBalance, settings, month),[trades,settings,month]);

      const monthOptions = useMemo(()=>{
        const s=new Set([thisMonth()]);
        trades.forEach(t=>s.add(t.date.slice(0,7)));
        return [...s].sort().reverse();
      },[trades]);

      const handlePrefill = useCallback((data)=>{ setPrefill(data); setTab('real'); },[]);

      if (loading) return <div className="min-h-screen bg-gray-950 flex items-center justify-center text-white">Loading...</div>;
      if (error) return <div className="min-h-screen bg-gray-950 flex items-center justify-center text-red-500">Error: {error}</div>;

      return (
        <div className="min-h-screen bg-gray-950">
          {/* ── Migration Banner ── */}
          {migrationPending && (
            <div className="bg-amber-900 border-b border-amber-700 px-4 py-3 flex items-center justify-between gap-4">
              <p className="text-amber-200 text-sm">💾 ブラウザにローカルデータが見つかりました。クラウドに移行しますか？</p>
              <div className="flex gap-2 flex-shrink-0">
                <button onClick={handleMigrate} disabled={migrating}
                  className="bg-amber-500 hover:bg-amber-400 text-gray-900 font-bold px-4 py-1.5 rounded-lg text-sm disabled:opacity-50">
                  {migrating ? '移行中…' : '移行する'}
                </button>
                <button onClick={()=>setMigrationPending(false)} className="text-amber-400 hover:text-amber-200 px-3 py-1.5 text-sm">スキップ</button>
              </div>
            </div>
          )}
          {/* ── Header ── */}
          <header className="bg-gray-900 border-b border-gray-800 sticky top-0 z-20 shadow-xl">
            <div className="max-w-7xl mx-auto px-4 py-3">
              <div className="flex items-center justify-between gap-4">
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-lg flex items-center justify-center text-sm">📊</div>
                  <div>
                    <h1 className="text-white font-bold text-sm">PL 管理ダッシュボード</h1>
                    <p className="text-gray-600 text-xs">{new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'})}</p>
                  </div>
                </div>
                <div className="flex items-center gap-5">
                  <div className="text-right hidden sm:block">
                    <div className="text-gray-600 text-xs">残高</div>
                    <div className={`font-bold text-sm font-mono ${realMetrics.currentBalance>=settings.initialBalance?'text-emerald-400':'text-red-400'}`}>
                      ${realMetrics.currentBalance.toFixed(2)}
                    </div>
                  </div>
                </div>
              </div>
              {/* Top-level section nav */}
              <nav className="flex gap-1 mt-3 overflow-x-auto pb-1">
                {SECTIONS.map(({key,label})=>(
                  <button key={key} onClick={()=>setSection(key)}
                    className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-colors whitespace-nowrap flex-shrink-0 ${section===key?'bg-indigo-600 text-white':'text-gray-400 hover:text-white hover:bg-gray-800'}`}>
                    {label}
                  </button>
                ))}
              </nav>
              {/* Sub-tabs for trading section */}
              {section==='trading'&&(
                <nav className="flex gap-1 mt-1 overflow-x-auto pb-1">
                  {TABS.map(({key,label})=>(
                    <button key={key} onClick={()=>setTab(key)}
                      className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-colors whitespace-nowrap flex-shrink-0 ${tab===key?'bg-blue-600 text-white':'text-gray-500 hover:text-white hover:bg-gray-800'}`}>
                      {label}
                      {key==='real'&&realMetrics.pendingCount>0&&<span className="ml-1.5 bg-amber-500 text-gray-900 rounded-full text-xs w-4 h-4 inline-flex items-center justify-center font-bold">{realMetrics.pendingCount}</span>}
                    </button>
                  ))}
                </nav>
              )}
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 py-6">
            {/* Trading section */}
            {section==='trading'&&<>
              {tab!=='settings'&&tab!=='entry'&&(
                <div className="flex items-center gap-3 mb-5">
                  <label className="text-gray-500 text-xs">表示月:</label>
                  <select value={month} onChange={e=>setMonth(e.target.value)}
                    className="bg-gray-800 text-white rounded-lg px-3 py-1.5 text-sm border border-gray-700 focus:border-blue-500 focus:outline-none">
                    {monthOptions.map(m=><option key={m} value={m}>{m}</option>)}
                  </select>
                </div>
              )}
              {tab==='dashboard'&&<DashboardTab trades={trades} settings={settings} month={month} />}
              {tab==='entry'   &&<EntryChecker settings={settings} metrics={realMetrics} onPrefillTrade={handlePrefill} />}
              {tab==='real'&&<TradeTabContent trades={trades} onAddTrade={addTrade} onUpdateTrade={updateTrade} onDeleteTrade={deleteTrade} settings={settings} initialBalance={settings.initialBalance} month={month} prefill={prefill} clearPrefill={()=>setPrefill(null)} />}
              {tab==='settings'&&<SettingsForm settings={settings} onSave={saveSettings} />}
            </>}
            {/* Poker section */}
            {section==='poker'&&(
              <PokerPage sessions={pokerSessions} checkins={pokerCheckins} handReviews={handReviews}
                onAdd={addPokerSession} onUpdate={updatePokerSession} onDelete={deletePokerSession}
                onCheckin={upsertPokerCheckin}
                onAddHand={addHandReview} onUpdateHand={updateHandReview} onDeleteHand={deleteHandReview}/>
            )}
            {/* Prediction section */}
            {section==='predict'&&(
              <PredictionPage bets={predictionBets}
                onAdd={addPredictionBet} onUpdate={updatePredictionBet} onDelete={deletePredictionBet}/>
            )}
            {/* Calendar section */}
            {section==='calendar'&&(
              <CalendarPage pokerSessions={pokerSessions} trades={trades} predictionBets={predictionBets}/>
            )}
          </main>

          <footer className="max-w-7xl mx-auto px-4 py-6 text-center text-gray-700 text-xs">
            データはサーバーのデータベースに保存されます
          </footer>
        </div>
      );
    };

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null }; }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      render() {
        if (this.state.hasError) {
          return <div className="min-h-screen bg-gray-950 p-10 text-red-500 font-mono text-sm whitespace-pre-wrap">
            React Rendering Error:<br/><br/>{this.state.error?.toString()}
          </div>;
        }
        return this.props.children;
      }
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App /></ErrorBoundary>);
    {% endraw %}
  </script>
</body>
</html>
