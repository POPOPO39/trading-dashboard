<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>トレード KGI/KPI ダッシュボード</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/regenerator-runtime@0.14.1/runtime.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:#111827; }
    ::-webkit-scrollbar-thumb { background:#374151; border-radius:3px; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter:invert(0.6); }
    .fade-in  { animation: fadeIn  0.18s ease; }
    .slide-in { animation: slideIn 0.20s ease; }
    @keyframes fadeIn  { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideIn { from{opacity:0;transform:translateX(8px)}  to{opacity:1;transform:translateX(0)} }
    .pending-row { background: rgba(251,191,36,0.06); }
    .pending-row:hover { background: rgba(251,191,36,0.1) !important; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    {% raw %}
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // ── Storage Keys ──────────────────────────────────────────────────────
    const TRADES_KEY      = 'tradedb_trades_v2';
    const SETTINGS_KEY    = 'tradedb_settings_v2';

    const DEFAULT_SETTINGS = {
      initialBalance:     1000,
      monthlyTargetPct:   20,
      dailyLossLimitPct:  6,
      monthlyDDLimitPct:  10,
      minWinRate:         50,
      minRR:              2.0,
      minComplianceRate:  90,
      maxRiskPerTradePct: 2,
    };

    const parseResp = async (r) => {
      const text = await r.text();
      try { return JSON.parse(text); }
      catch { throw new Error(`Server error ${r.status}: ${text.slice(0,200)}`); }
    };
    const api = {
      get:  async (url)        => parseResp(await fetch(url)),
      post: async (url, data)  => parseResp(await fetch(url, { method:'POST',   headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) })),
      put:  async (url, data)  => parseResp(await fetch(url, { method:'PUT',    headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) })),
      del:  async (url)        => parseResp(await fetch(url, { method:'DELETE' })),
    };

    // ── Helpers ───────────────────────────────────────────────────────────
    const todayStr  = () => new Date().toISOString().split('T')[0];
    const thisMonth = () => todayStr().slice(0, 7);
    const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

    const fmt$    = (v) => { const a = Math.abs(v).toFixed(2); return v >= 0 ? `+$${a}` : `-$${a}`; };
    const fmtAbs$ = (v) => `$${Math.abs(v).toFixed(2)}`;
    const fmtPct  = (v) => { const a = Math.abs(v).toFixed(1); return v >= 0 ? `+${a}%` : `-${a}%`; };
    const fmtDate = (s) => { if (!s) return ''; const [y,m,d] = s.split('-'); return `${y}/${m}/${d}`; };

    const fmtPrice = (v, pair) => {
      const n = parseFloat(v);
      if (isNaN(n)) return '—';
      const p = (pair||'').toUpperCase();
      if (p.includes('JPY')) return n.toFixed(3);
      if (p.includes('XAU')||p.includes('GOLD')) return n.toFixed(2);
      if (!p.includes('/')) return n.toFixed(2);
      return n.toFixed(5);
    };

    // pip size per instrument
    const getPipSize = (pair) => {
      const p = (pair||'').toUpperCase();
      if (p.includes('JPY')) return 0.01;
      if (/XAU|GOLD|SILVER|XAG/.test(p)) return 0.01;
      if (!p.includes('/') || /BTC|ETH|DOGE/.test(p)) return 1;
      return 0.0001;
    };
    const getPipLabel = (pair) => {
      const p = (pair||'').toUpperCase();
      if (!p.includes('/') || /BTC|ETH/.test(p)) return 'pt';
      return 'pips';
    };

    // net P&L helper (commission always costs money)
    const netPnl = (t) => t.status === 'pending' ? 0 : (t.pnl || 0) - (t.commission || 0);

    // ── Metrics ───────────────────────────────────────────────────────────
    const calcMetrics = (allTrades, initialBalance, settings, month) => {
      const closed = allTrades.filter(t => t.status !== 'pending');

      const monthTrades  = closed.filter(t => t.date.startsWith(month));
      const todayTrades  = closed.filter(t => t.date === todayStr());

      const total   = monthTrades.length;
      const wins    = monthTrades.filter(t => t.result === 'win').length;
      const losses  = total - wins;
      const winRate = total > 0 ? wins / total * 100 : null;

      const rrArr = monthTrades.filter(t => t.rr > 0).map(t => t.rr);
      const avgRR = rrArr.length > 0 ? rrArr.reduce((s,v)=>s+v,0)/rrArr.length : null;

      const compliantCount = monthTrades.filter(t => t.ruleCompliant).length;
      const complianceRate = total > 0 ? compliantCount/total*100 : null;

      const monthNetPnL  = monthTrades.reduce((s,t) => s+netPnl(t), 0);
      const monthGrossPnL= monthTrades.reduce((s,t) => s+(t.pnl||0), 0);
      const monthCommission = monthTrades.reduce((s,t) => s+(t.commission||0), 0);
      const monthTarget  = initialBalance * settings.monthlyTargetPct / 100;
      const kgiPct       = monthTarget > 0 ? monthNetPnL/monthTarget*100 : 0;

      const todayLoss         = todayTrades.reduce((s,t) => s + Math.min(0, netPnl(t)), 0);
      const dailyLossLimitAmt = initialBalance * settings.dailyLossLimitPct / 100;
      const dailyLimitHit     = todayTrades.length > 0 && Math.abs(todayLoss) >= dailyLossLimitAmt;

      // Monthly DD (on net P&L)
      const priorClosed = closed.filter(t => t.date < month+'-01');
      let bal  = initialBalance + priorClosed.reduce((s,t)=>s+netPnl(t),0);
      let peak = bal, maxDD = 0;
      const sorted = [...monthTrades].sort((a,b)=>a.date.localeCompare(b.date));
      for (const t of sorted) {
        bal += netPnl(t);
        if (bal > peak) peak = bal;
        const dd = initialBalance > 0 ? (bal-peak)/initialBalance*100 : 0;
        if (dd < maxDD) maxDD = dd;
      }

      const currentBalance = initialBalance + closed.reduce((s,t)=>s+netPnl(t),0);

      // Commission stats
      const allMonthGross = Math.abs(monthGrossPnL);
      const commissionRate = allMonthGross > 0 ? monthCommission/allMonthGross*100 : 0;

      // Pending count
      const pendingCount = allTrades.filter(t => t.status==='pending' && t.date.startsWith(month)).length;

      return {
        total, wins, losses, winRate, avgRR, complianceRate,
        monthNetPnL, monthGrossPnL, monthCommission, commissionRate,
        monthTarget, kgiPct,
        todayLoss, dailyLossLimitAmt, dailyLimitHit,
        maxDD, currentBalance, pendingCount,
      };
    };

    // ── Entry Evaluation ──────────────────────────────────────────────────
    const evaluateEntry = ({ direction, pair, entry, sl, tp, lotSize, pipValuePerLot, manualRisk, settings, metrics }) => {
      const eN = parseFloat(entry);
      const sN = parseFloat(sl);
      const tN = parseFloat(tp);
      if ([eN,sN,tN].some(isNaN)) return null;

      let riskPriceDiff, rewardPriceDiff, validLevels;
      if (direction === 'long') {
        riskPriceDiff   = eN - sN;
        rewardPriceDiff = tN - eN;
        validLevels     = sN < eN && tN > eN;
      } else {
        riskPriceDiff   = sN - eN;
        rewardPriceDiff = eN - tN;
        validLevels     = sN > eN && tN < eN;
      }

      if (!validLevels || riskPriceDiff <= 0 || rewardPriceDiff <= 0) {
        return { error: direction==='long'
          ? 'ロング: SL < エントリー < TP の順が必要です'
          : 'ショート: TP < エントリー < SL の順が必要です' };
      }

      const pipSz  = getPipSize(pair);
      const slPips = riskPriceDiff   / pipSz;
      const tpPips = rewardPriceDiff / pipSz;
      const rr     = rewardPriceDiff / riskPriceDiff;

      // Position-based or manual risk
      const lotN  = parseFloat(lotSize);
      const pvN   = parseFloat(pipValuePerLot);
      const usingPos = lotN > 0 && pvN > 0;

      let riskAmt, rewardAmt;
      if (usingPos) {
        riskAmt   = lotN * pvN * slPips;
        rewardAmt = lotN * pvN * tpPips;
      } else {
        riskAmt = parseFloat(manualRisk);
        if (isNaN(riskAmt) || riskAmt <= 0) return null;
        rewardAmt = riskAmt * rr;
      }

      const riskPct     = riskAmt / metrics.currentBalance * 100;
      const dailyRemain = metrics.dailyLossLimitAmt - Math.abs(metrics.todayLoss);

      const checks = [
        {
          key: 'rr',
          label: `RR比 1:${rr.toFixed(2)} ≥ 目標 1:${settings.minRR}`,
          ok: rr >= settings.minRR,
          detail: rr < settings.minRR
            ? `あと ${((settings.minRR-rr)*slPips).toFixed(1)} ${getPipLabel(pair)} TPを伸ばすかSLを詰めてください`
            : null,
        },
        {
          key: 'riskPct',
          label: `リスク率 ${riskPct.toFixed(2)}% ≤ 上限 ${settings.maxRiskPerTradePct}%`,
          ok: riskPct <= settings.maxRiskPerTradePct,
          detail: riskPct > settings.maxRiskPerTradePct
            ? `リスク $${riskAmt.toFixed(2)} が上限 $${(metrics.currentBalance*settings.maxRiskPerTradePct/100).toFixed(2)} を超えています`
            : null,
        },
        {
          key: 'dailyBudget',
          label: `1日損失残枠 $${Math.max(0,dailyRemain).toFixed(2)} ≥ リスク額`,
          ok: riskAmt <= dailyRemain,
          detail: riskAmt > dailyRemain
            ? `残り損失枠 $${Math.max(0,dailyRemain).toFixed(2)} 以内にリスクを抑えてください`
            : null,
        },
        {
          key: 'ddBudget',
          label: `月次DD残枠内 (現在 ${metrics.maxDD.toFixed(1)}%)`,
          ok: metrics.maxDD > -settings.monthlyDDLimitPct,
          detail: metrics.maxDD <= -settings.monthlyDDLimitPct
            ? `月次DD上限 -${settings.monthlyDDLimitPct}% に達しています`
            : null,
        },
      ];

      return {
        rr, slPips, tpPips, riskAmt, rewardAmt, riskPct,
        riskPriceDiff, rewardPriceDiff, pipSz,
        usingPos, lotN, pvN,
        dailyRemain, checks, allOk: checks.every(c=>c.ok),
        entry: eN, sl: sN, tp: tN, direction, pair,
      };
    };

    // ── Status styles ─────────────────────────────────────────────────────
    const SS = {
      good:    { border:'border-emerald-500', text:'text-emerald-400', icon:'✅' },
      warn:    { border:'border-yellow-500',  text:'text-yellow-400',  icon:'⚠️' },
      bad:     { border:'border-red-500',     text:'text-red-400',     icon:'🚨' },
      neutral: { border:'border-gray-700',    text:'text-gray-400',    icon:'—'  },
    };
    const kpiStat = (v, tgt, higher=true) => {
      if (v == null) return 'neutral';
      return higher ? (v>=tgt?'good':v>=tgt*0.85?'warn':'bad')
                    : (v>=tgt?'good':v>=tgt*1.2?'warn':'bad');
    };

    // ══════════════════════════════════════════════════════════════════════
    // SMALL COMPONENTS
    // ══════════════════════════════════════════════════════════════════════

    const KPICard = ({ label, displayValue, targetLabel, status, sub, priority }) => {
      const s = SS[status]||SS.neutral;
      return (
        <div className={`bg-gray-800 rounded-xl p-4 border-l-4 ${s.border} fade-in`}>
          <div className="flex items-start justify-between mb-2">
            <span className="text-gray-400 text-xs leading-snug">{label}{priority&&<span className="ml-1 text-red-400">●</span>}</span>
            <span className="text-base">{s.icon}</span>
          </div>
          <div className={`text-2xl font-bold font-mono ${s.text}`}>{displayValue}</div>
          <div className="text-gray-500 text-xs mt-1">目標: {targetLabel}</div>
          {sub&&<div className="text-gray-600 text-xs">{sub}</div>}
        </div>
      );
    };

    const KGICard = ({ metrics, settings, month, initialBalance }) => {
      const { monthNetPnL, monthTarget, kgiPct } = metrics;
      const pct = Math.min(100, Math.max(0, kgiPct));
      const color = kgiPct>=100?'bg-emerald-500':kgiPct>=60?'bg-blue-500':kgiPct>=30?'bg-yellow-500':'bg-red-500';
      const MO={'01':'1月','02':'2月','03':'3月','04':'4月','05':'5月','06':'6月','07':'7月','08':'8月','09':'9月','10':'10月','11':'11月','12':'12月'};
      const [y,m] = month.split('-');
      return (
        <div className="bg-gray-800 rounded-xl p-6">
          <div className="flex items-start justify-between mb-4">
            <div>
              <h2 className="text-base font-bold text-white">🎯 KGI 月次目標</h2>
              <p className="text-gray-400 text-sm mt-0.5">{y}年 {MO[m]} ｜ 目標: ${monthTarget.toFixed(0)} (月利 {settings.monthlyTargetPct}%)</p>
            </div>
            <div className={`text-4xl font-bold font-mono ${kgiPct>=100?'text-emerald-400':kgiPct>=0?'text-white':'text-red-400'}`}>
              {kgiPct.toFixed(0)}<span className="text-lg text-gray-500">%</span>
            </div>
          </div>
          <div className="w-full bg-gray-700 rounded-full h-3 mb-3 overflow-hidden">
            <div className={`h-3 rounded-full transition-all duration-700 ${color}`} style={{width:`${pct}%`}} />
          </div>
          <div className="flex justify-between text-sm">
            <span className={monthNetPnL>=0?'text-emerald-400 font-medium':'text-red-400 font-medium'}>{fmt$(monthNetPnL)} <span className="text-gray-600 text-xs font-normal">(純利益)</span></span>
            <span className="text-gray-500">目標: ${monthTarget.toFixed(0)}</span>
          </div>
        </div>
      );
    };

    const AlertBanner = ({ metrics, settings }) => {
      const alerts = [];
      if (metrics.dailyLimitHit) alerts.push(`🚨 本日の損失が上限 $${metrics.dailyLossLimitAmt.toFixed(0)} (${settings.dailyLossLimitPct}%) に達しました。本日のトレードを終了してください。`);
      if (metrics.maxDD < -settings.monthlyDDLimitPct) alerts.push(`🚨 月次ドローダウン ${metrics.maxDD.toFixed(1)}% が上限 -${settings.monthlyDDLimitPct}% を超えています。ポジションサイズを縮小してください。`);
      if (metrics.pendingCount > 0) alerts.push(`⏳ 未決済のトレードが ${metrics.pendingCount} 件あります。「リアルトレード」タブで結果を記録してください。`);
      if (!alerts.length) return null;
      return (
        <div className="space-y-2 mb-5">
          {alerts.map((msg, i) => (
            <div key={i} className={`${msg.startsWith('⏳')?'bg-amber-950 border-amber-600':'bg-red-950 border-red-600'} border rounded-xl p-4 text-sm font-medium ${msg.startsWith('⏳')?'text-amber-200':'text-red-200'}`}>
              {msg}
            </div>
          ))}
        </div>
      );
    };

    const AssetChart = ({ trades, initialBalance, color='#10b981', label='口座残高' }) => {
      const canvasRef = useRef(null);
      const chartRef  = useRef(null);

      const chartData = useMemo(() => {
        const closed = trades.filter(t=>t.status!=='pending');
        if (!closed.length) return null;
        const sorted = [...closed].sort((a,b)=>a.date.localeCompare(b.date));
        const perDay = {};
        let bal = initialBalance;
        for (const t of sorted) { bal += netPnl(t); perDay[t.date] = bal; }
        const labels = ['開始', ...Object.keys(perDay).map(fmtDate)];
        const data   = [initialBalance, ...Object.values(perDay)];
        const ptColors = data.map(v => v>=initialBalance?'#10b981':'#ef4444');
        return { labels, data, ptColors };
      }, [trades, initialBalance]);

      useEffect(() => {
        if (!canvasRef.current) return;
        if (chartRef.current) { chartRef.current.destroy(); chartRef.current=null; }
        if (!chartData) return;
        const ctx = canvasRef.current.getContext('2d');
        const grad = ctx.createLinearGradient(0,0,0,240);
        const [r,g,b] = color==='#10b981'?[16,185,129]:[99,102,241];
        grad.addColorStop(0,`rgba(${r},${g},${b},0.22)`);
        grad.addColorStop(1,`rgba(${r},${g},${b},0.02)`);
        chartRef.current = new Chart(ctx, {
          type:'line',
          data:{ labels:chartData.labels, datasets:[{
            label, data:chartData.data, borderColor:color, backgroundColor:grad,
            borderWidth:2.5, pointRadius:4, pointHoverRadius:7,
            pointBackgroundColor:chartData.ptColors, pointBorderColor:chartData.ptColors,
            fill:true, tension:0.35
          }]},
          options:{
            responsive:true, maintainAspectRatio:false,
            interaction:{mode:'index',intersect:false},
            plugins:{
              legend:{labels:{color:'#9ca3af',font:{size:12}}},
              tooltip:{
                backgroundColor:'#1f2937',borderColor:'#374151',borderWidth:1,
                titleColor:'#9ca3af',bodyColor:'#f9fafb',
                callbacks:{label:ctx=>{const v=ctx.parsed.y;const d=v-initialBalance;return ` $${v.toFixed(2)}  (${d>=0?'+':''}$${d.toFixed(2)})`;}}
              }
            },
            scales:{
              x:{ticks:{color:'#6b7280',maxRotation:45,font:{size:11}},grid:{color:'#1f2937'}},
              y:{ticks:{color:'#6b7280',callback:v=>`$${v}`,font:{size:11}},grid:{color:'#374151'}}
            }
          }
        });
        return ()=>{ if(chartRef.current){chartRef.current.destroy();chartRef.current=null;} };
      }, [chartData, color, label, initialBalance]);

      return !chartData
        ? <div className="flex items-center justify-center h-52 text-gray-500 text-sm">トレードを記録すると資産推移が表示されます</div>
        : <div style={{height:'240px'}}><canvas ref={canvasRef}/></div>;
    };

    // ── Commission Panel ──────────────────────────────────────────────────
    const CommissionPanel = ({ metrics }) => {
      const { monthCommission, commissionRate, total } = metrics;
      if (monthCommission === 0 && total === 0) return null;
      return (
        <div className="bg-gray-800 rounded-xl p-5">
          <h3 className="text-sm font-bold text-white mb-4">💸 手数料サマリー</h3>
          <div className="grid grid-cols-3 gap-4">
            <div>
              <div className="text-gray-500 text-xs mb-1">今月の手数料合計</div>
              <div className="text-xl font-bold font-mono text-orange-400">-${monthCommission.toFixed(2)}</div>
            </div>
            <div>
              <div className="text-gray-500 text-xs mb-1">手数料率 (対粗利益)</div>
              <div className="text-xl font-bold font-mono text-orange-400">
                {commissionRate > 0 ? `${commissionRate.toFixed(1)}%` : '—'}
              </div>
            </div>
            <div>
              <div className="text-gray-500 text-xs mb-1">平均手数料/トレード</div>
              <div className="text-xl font-bold font-mono text-orange-400">
                {total > 0 ? `-$${(monthCommission/total).toFixed(2)}` : '—'}
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ══════════════════════════════════════════════════════════════════════
    // ENTRY CHECKER
    // ══════════════════════════════════════════════════════════════════════

    const PriceLadder = ({ result }) => {
      if (!result || result.error) return null;
      const { direction, entry, sl, tp, riskAmt, rewardAmt, rr, slPips, tpPips, pair } = result;
      const isLong  = direction === 'long';
      const pipLabel = getPipLabel(pair);
      const riskH  = 80;
      const rewH   = Math.min(220, Math.max(30, Math.round(riskH * Math.min(rr, 5))));

      const priceBlock = (price, label, colorClass, bgClass, borderClass, amount, amountColor) => (
        <div className={`w-full ${bgClass} border ${borderClass} rounded-lg px-4 py-3`}>
          <div className="flex items-center justify-between">
            <div>
              <div className={`${colorClass} text-xs font-semibold`}>{label}</div>
              <div className="text-white font-mono text-base">{fmtPrice(price, pair)}</div>
            </div>
            {amount !== undefined && (
              <div className={`text-right ${amountColor} font-mono font-bold text-sm`}>{amount}</div>
            )}
          </div>
        </div>
      );

      const connector = (pips, dollarAmt, colorLine, colorText, height) => (
        <div className="flex items-center gap-3 w-full" style={{height:`${height}px`}}>
          <div className={`w-0.5 h-full ${colorLine} rounded mx-4`} />
          <div className={`text-xs ${colorText} space-y-0.5`}>
            <div className="font-mono">{pips.toFixed(1)} {pipLabel}</div>
            {dollarAmt !== undefined && <div className="font-bold">{dollarAmt}</div>}
          </div>
        </div>
      );

      const levels = isLong
        ? [
            { el: priceBlock(tp, 'TP（利確）', 'text-emerald-400', 'bg-emerald-900/30', 'border-emerald-700', fmt$(rewardAmt), 'text-emerald-400') },
            { el: connector(tpPips, `+${fmtAbs$(rewardAmt)}`, 'bg-emerald-700', 'text-emerald-400', rewH) },
            { el: priceBlock(entry, 'エントリー', 'text-blue-300', 'bg-blue-900/30', 'border-blue-600', null) },
            { el: connector(slPips, `-${fmtAbs$(riskAmt)}`, 'bg-red-700', 'text-red-400', riskH) },
            { el: priceBlock(sl, 'SL（損切）', 'text-red-400', 'bg-red-900/30', 'border-red-700', fmt$(-riskAmt), 'text-red-400') },
          ]
        : [
            { el: priceBlock(sl, 'SL（損切）', 'text-red-400', 'bg-red-900/30', 'border-red-700', fmt$(-riskAmt), 'text-red-400') },
            { el: connector(slPips, `-${fmtAbs$(riskAmt)}`, 'bg-red-700', 'text-red-400', riskH) },
            { el: priceBlock(entry, 'エントリー', 'text-blue-300', 'bg-blue-900/30', 'border-blue-600', null) },
            { el: connector(tpPips, `+${fmtAbs$(rewardAmt)}`, 'bg-emerald-700', 'text-emerald-400', rewH) },
            { el: priceBlock(tp, 'TP（利確）', 'text-emerald-400', 'bg-emerald-900/30', 'border-emerald-700', fmt$(rewardAmt), 'text-emerald-400') },
          ];

      return (
        <div className="flex gap-6">
          {/* Price ladder */}
          <div className="flex flex-col items-stretch min-w-[200px] flex-shrink-0">
            {levels.map((l,i) => <div key={i}>{l.el}</div>)}
          </div>

          {/* RR bar + summary */}
          <div className="flex-1 space-y-4">
            <div>
              <div className="text-gray-500 text-xs font-semibold uppercase tracking-widest mb-3">RR 比較</div>
              <div className="space-y-2">
                <div className="flex items-center gap-3">
                  <div className="bg-red-600 rounded h-7 flex items-center px-3" style={{width:'90px',minWidth:'90px'}}>
                    <span className="text-white text-xs font-bold">リスク 1</span>
                  </div>
                  <span className="text-red-400 text-sm font-mono">{fmtAbs$(riskAmt)}</span>
                </div>
                <div className="flex items-center gap-3">
                  <div className="bg-emerald-600 rounded h-7 flex items-center px-3 transition-all duration-500"
                    style={{width:`${Math.min(90*rr,280)}px`,minWidth:'30px'}}>
                    <span className="text-white text-xs font-bold">リワード {rr.toFixed(2)}</span>
                  </div>
                  <span className="text-emerald-400 text-sm font-mono">{fmtAbs$(rewardAmt)}</span>
                </div>
              </div>
            </div>

            <div className="grid grid-cols-2 gap-3">
              <div className="bg-gray-700 rounded-lg p-3">
                <div className="text-gray-500 text-xs">RR比</div>
                <div className="text-xl font-bold font-mono">1:<span className={rr>=2?'text-emerald-400':'text-red-400'}>{rr.toFixed(2)}</span></div>
              </div>
              <div className="bg-gray-700 rounded-lg p-3">
                <div className="text-gray-500 text-xs">リスク率</div>
                <div className={`text-xl font-bold font-mono ${result.riskPct <= result.settings?.maxRiskPerTradePct ? 'text-emerald-400':'text-red-400'}`}>
                  {result.riskPct.toFixed(2)}%
                </div>
              </div>
            </div>

            {result.usingPos && (
              <div className="bg-blue-950/40 border border-blue-800 rounded-lg px-3 py-2 text-xs text-blue-300">
                📐 {result.lotN} lot × {result.slPips.toFixed(1)} {getPipLabel(result.pair)} × ${result.pvN}/lot = ${result.riskAmt.toFixed(2)}
              </div>
            )}
          </div>
        </div>
      );
    };

    // attach settings to result for display
    const withSettings = (result, settings) => result ? { ...result, settings } : result;

    const EntryChecker = ({ settings, metrics, onPrefillTrade }) => {
      const [direction, setDirection] = useState('long');
      const [pair,      setPair]      = useState('');
      const [entry,     setEntry]     = useState('');
      const [sl,        setSl]        = useState('');
      const [tp,        setTp]        = useState('');
      const [lotSize,   setLotSize]   = useState('');
      const [pipValue,  setPipValue]  = useState('10');
      const [manualRisk,setManualRisk]= useState('');
      const [usePosSize,setUsePosSize]= useState(true);

      const result = useMemo(() => {
        const r = evaluateEntry({ direction, pair, entry, sl, tp, lotSize, pipValuePerLot: pipValue, manualRisk, settings, metrics });
        return withSettings(r, settings);
      }, [direction, pair, entry, sl, tp, lotSize, pipValue, manualRisk, settings, metrics]);

      const hasResult = result && !result.error;
      const pipLabel  = getPipLabel(pair);
      const inp = "w-full bg-gray-700 text-white rounded-lg px-3 py-2 text-sm border border-gray-600 focus:border-blue-500 focus:outline-none placeholder-gray-500 font-mono";

      return (
        <div className="space-y-5 fade-in">
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">

            {/* ── Inputs ── */}
            <div className="bg-gray-800 rounded-xl p-6 space-y-5">
              <h2 className="text-base font-bold text-white">🎯 エントリー条件入力</h2>

              {/* Direction */}
              <div>
                <label className="block text-gray-400 text-xs mb-2">エントリー方向</label>
                <div className="flex rounded-lg overflow-hidden border border-gray-700">
                  {[{v:'long',label:'▲ ロング（買い）'},{v:'short',label:'▼ ショート（売り）'}].map(({v,label})=>(
                    <button key={v} type="button" onClick={()=>setDirection(v)}
                      className={`flex-1 py-2 text-sm font-semibold transition-colors ${direction===v?(v==='long'?'bg-emerald-600 text-white':'bg-red-600 text-white'):'bg-gray-700 text-gray-400 hover:text-white'}`}>
                      {label}
                    </button>
                  ))}
                </div>
              </div>

              {/* Pair */}
              <div>
                <label className="block text-gray-400 text-xs mb-1">通貨ペア / 銘柄</label>
                <input type="text" placeholder="例: USD/JPY, GOLD, NASDAQ" value={pair} onChange={e=>setPair(e.target.value.toUpperCase())}
                  className="w-full bg-gray-700 text-white rounded-lg px-3 py-2 text-sm border border-gray-600 focus:border-blue-500 focus:outline-none placeholder-gray-500" />
                {pair && <p className="text-gray-600 text-xs mt-1">Pipサイズ: {getPipSize(pair)} ({pipLabel})</p>}
              </div>

              {/* TP / Entry / SL */}
              <div className="space-y-3">
                <div>
                  <label className="block text-xs mb-1 text-emerald-400">TP 価格（利確）</label>
                  <input type="number" step="any" value={tp} onChange={e=>setTp(e.target.value)} className={inp}
                    placeholder={direction==='long'?'エントリーより高い価格':'エントリーより低い価格'} />
                </div>
                <div>
                  <label className="block text-xs mb-1 text-blue-300">エントリー価格</label>
                  <input type="number" step="any" value={entry} onChange={e=>setEntry(e.target.value)} className={inp} placeholder="例: 149.500" />
                </div>
                <div>
                  <label className="block text-xs mb-1 text-red-400">SL 価格（損切）</label>
                  <input type="number" step="any" value={sl} onChange={e=>setSl(e.target.value)} className={inp}
                    placeholder={direction==='long'?'エントリーより低い価格':'エントリーより高い価格'} />
                </div>

                {/* pip distances preview */}
                {result && !result.error && (
                  <div className="grid grid-cols-2 gap-2 text-xs">
                    <div className="bg-red-950/40 border border-red-800/50 rounded-lg px-3 py-2">
                      <span className="text-gray-500">SL距離: </span>
                      <span className="text-red-300 font-mono">{result.slPips.toFixed(1)} {pipLabel}</span>
                    </div>
                    <div className="bg-emerald-950/40 border border-emerald-800/50 rounded-lg px-3 py-2">
                      <span className="text-gray-500">TP距離: </span>
                      <span className="text-emerald-300 font-mono">{result.tpPips.toFixed(1)} {pipLabel}</span>
                    </div>
                  </div>
                )}
              </div>

              {/* Position Size */}
              <div className="border-t border-gray-700 pt-4">
                <div className="flex items-center justify-between mb-3">
                  <label className="text-gray-300 text-sm font-semibold">📐 ポジションサイズ</label>
                  <button type="button" onClick={()=>setUsePosSize(v=>!v)}
                    className="text-xs text-gray-500 hover:text-blue-400 transition-colors">
                    {usePosSize ? '手動入力に切替' : 'サイズ計算に切替'}
                  </button>
                </div>

                {usePosSize ? (
                  <div className="space-y-3">
                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="block text-gray-400 text-xs mb-1">ロット数</label>
                        <input type="number" step="0.01" min="0" placeholder="例: 0.10" value={lotSize} onChange={e=>setLotSize(e.target.value)} className={inp} />
                      </div>
                      <div>
                        <label className="block text-gray-400 text-xs mb-1">Pip価値 ($/lot)</label>
                        <input type="number" step="0.01" min="0" placeholder="例: 10.00" value={pipValue} onChange={e=>setPipValue(e.target.value)} className={inp} />
                      </div>
                    </div>
                    <p className="text-gray-600 text-xs">通常 FX: $10/lot。USD/JPY は現在レートで変動します</p>
                    {hasResult && result.usingPos && (
                      <div className="grid grid-cols-2 gap-2">
                        <div className="bg-red-950/40 border border-red-800/50 rounded-lg px-3 py-2">
                          <div className="text-gray-500 text-xs">リスク額</div>
                          <div className="text-red-300 font-mono font-bold">-${result.riskAmt.toFixed(2)}</div>
                          <div className="text-gray-600 text-xs">{result.riskPct.toFixed(2)}% of 残高</div>
                        </div>
                        <div className="bg-emerald-950/40 border border-emerald-800/50 rounded-lg px-3 py-2">
                          <div className="text-gray-500 text-xs">リワード額</div>
                          <div className="text-emerald-300 font-mono font-bold">+${result.rewardAmt.toFixed(2)}</div>
                          <div className="text-gray-600 text-xs">{(result.rewardAmt/metrics.currentBalance*100).toFixed(2)}% of 残高</div>
                        </div>
                      </div>
                    )}
                  </div>
                ) : (
                  <div>
                    <label className="block text-gray-400 text-xs mb-1">リスク金額 ($)</label>
                    <input type="number" step="0.01" min="0.01"
                      placeholder={`例: ${(metrics.currentBalance*settings.maxRiskPerTradePct/100).toFixed(2)}`}
                      value={manualRisk} onChange={e=>setManualRisk(e.target.value)} className={inp} />
                    {manualRisk && !isNaN(parseFloat(manualRisk)) && (
                      <p className="text-gray-500 text-xs mt-1">残高比: {(parseFloat(manualRisk)/metrics.currentBalance*100).toFixed(2)}%</p>
                    )}
                  </div>
                )}
              </div>

              {result?.error && (
                <div className="bg-red-950 border border-red-700 rounded-lg px-4 py-3 text-red-300 text-sm">⚠️ {result.error}</div>
              )}
            </div>

            {/* ── Results visual ── */}
            <div className="bg-gray-800 rounded-xl p-6">
              {!hasResult ? (
                <div className="flex flex-col items-center justify-center h-full gap-3 text-center py-10">
                  <div className="text-5xl">📐</div>
                  <p className="text-gray-500 text-sm">価格レベルとポジションサイズを<br/>入力すると自動で計算されます</p>
                </div>
              ) : (
                <div className="space-y-4 slide-in">
                  <h3 className="text-sm font-bold text-white">
                    {pair&&<span className="text-gray-400 mr-2">{pair}</span>}
                    {direction==='long'?'▲ ロング':'▼ ショート'}
                  </h3>
                  <PriceLadder result={result} />
                </div>
              )}
            </div>
          </div>

          {/* ── Rule Checks ── */}
          {hasResult && (
            <div className="bg-gray-800 rounded-xl p-6 space-y-4 fade-in">
              <h3 className="text-base font-bold text-white">📋 エントリールール判定</h3>
              <div className="space-y-2">
                {result.checks.map(chk => (
                  <div key={chk.key} className={`rounded-lg px-4 py-3 border ${chk.ok?'bg-emerald-950/40 border-emerald-800':'bg-red-950/40 border-red-800'}`}>
                    <div className="flex items-start gap-3">
                      <span className="text-base mt-0.5">{chk.ok?'✅':'❌'}</span>
                      <div className="flex-1">
                        <div className={`text-sm font-medium ${chk.ok?'text-emerald-300':'text-red-300'}`}>{chk.label}</div>
                        {chk.detail&&<div className="text-xs text-red-400 mt-0.5">{chk.detail}</div>}
                      </div>
                    </div>
                  </div>
                ))}
              </div>

              <div className={`rounded-xl p-5 border-2 text-center ${result.allOk?'bg-emerald-950 border-emerald-500':'bg-red-950 border-red-500'}`}>
                <div className="text-3xl mb-1">{result.allOk?'✅':'🚨'}</div>
                <div className={`text-xl font-bold ${result.allOk?'text-emerald-300':'text-red-300'}`}>
                  {result.allOk?'エントリー可能です':'ルール違反あり — エントリー不可'}
                </div>
                <div className="text-sm text-gray-400 mt-1">
                  {result.allOk
                    ? `RR 1:${result.rr.toFixed(2)} ｜ リスク $${result.riskAmt.toFixed(2)} (${result.riskPct.toFixed(1)}%) ｜ リワード $${result.rewardAmt.toFixed(2)}`
                    : `${result.checks.filter(c=>!c.ok).length} 項目が未達です。修正後にエントリーしてください。`}
                </div>
              </div>

              {onPrefillTrade && (
                <div className="flex gap-3 pt-1">
                  <button onClick={()=>onPrefillTrade({pair,direction,rr:result.rr,riskAmt:result.riskAmt,isReal:true})}
                    className="flex-1 bg-blue-700 hover:bg-blue-600 text-white rounded-lg py-2.5 text-sm font-semibold transition-colors">
                    📝 リアルトレードとして記録
                  </button>
                  <button onClick={()=>onPrefillTrade({pair,direction,rr:result.rr,riskAmt:result.riskAmt,isReal:false})}
                    className="flex-1 bg-indigo-700 hover:bg-indigo-600 text-white rounded-lg py-2.5 text-sm font-semibold transition-colors">
                    🎮 デモトレードとして記録
                  </button>
                </div>
              )}
            </div>
          )}
        </div>
      );
    };

    // ══════════════════════════════════════════════════════════════════════
    // TRADE FORM
    // ══════════════════════════════════════════════════════════════════════
    const TRADE_RULES = [
      { key:'ruleSplitEntry', label:'分割エントリーをしたか？' },
      { key:'ruleSlTpSet',    label:'利確・損切りポイントを置いたうえでエントリーしたか' },
      { key:'ruleChartBasis', label:'チャートを確認して、トレンドライン・フィボナッチ・抵抗線のうちいずれかの根拠でエントリーポイントを決めたか' },
    ];

    const EMPTY_FORM = (prefill) => ({
      date: todayStr(), pair: prefill?.pair||'', result:'win',
      pnl:'', rr: prefill?.rr ? parseFloat(prefill.rr).toFixed(2) : '',
      commission:'', lotSize:'', entryPrice:'',
      ruleSplitEntry:true, ruleSlTpSet:true, ruleChartBasis:true,
      notes:'', pending:false,
    });

    const TradeForm = ({ onAdd, onCancel, editTrade, prefill }) => {
      const [form, setForm] = useState(() => {
        if (editTrade) {
          return {
            ...editTrade,
            pnl:            Math.abs(editTrade.pnl||0).toString(),
            commission:     (editTrade.commission||0).toString(),
            rr:             editTrade.rr>0 ? editTrade.rr.toString() : '',
            lotSize:        (editTrade.lotSize||0) > 0 ? editTrade.lotSize.toString() : '',
            entryPrice:     (editTrade.entryPrice||0) > 0 ? editTrade.entryPrice.toString() : '',
            ruleSplitEntry: editTrade.ruleSplitEntry ?? true,
            ruleSlTpSet:    editTrade.ruleSlTpSet    ?? true,
            ruleChartBasis: editTrade.ruleChartBasis ?? true,
            pending:        editTrade.status === 'pending',
          };
        }
        return EMPTY_FORM(prefill);
      });
      const [error, setError] = useState('');
      const set = (k,v) => setForm(f=>({...f,[k]:v}));

      const pnlVal  = parseFloat(form.pnl);
      const commVal = parseFloat(form.commission) || 0;
      const grossPnl = form.pending ? 0 : (form.result==='loss' ? -Math.abs(pnlVal) : Math.abs(pnlVal));
      const netVal  = grossPnl - commVal;
      const posSize = (parseFloat(form.lotSize)||0) * (parseFloat(form.entryPrice)||0);
      const pnlPct  = posSize > 0 && !form.pending && !isNaN(pnlVal) && pnlVal > 0
                      ? (netVal / posSize * 100) : null;

      const handleSubmit = (e) => {
        e.preventDefault(); setError('');
        if (!form.pair.trim()) { setError('通貨ペア / 銘柄を入力してください'); return; }
        if (!form.pending) {
          if (isNaN(pnlVal)||pnlVal<=0) { setError('損益額に正の数値を入力してください'); return; }
        }
        onAdd({
          id:           editTrade?.id || uid(),
          date:         form.date,
          pair:         form.pair.trim().toUpperCase(),
          result:       form.pending ? 'pending' : form.result,
          pnl:          form.pending ? 0 : (form.result==='loss'?-Math.abs(pnlVal):Math.abs(pnlVal)),
          commission:   commVal,
          rr:             parseFloat(form.rr)||0,
          lotSize:        parseFloat(form.lotSize)||0,
          entryPrice:     parseFloat(form.entryPrice)||0,
          ruleSplitEntry: form.ruleSplitEntry,
          ruleSlTpSet:    form.ruleSlTpSet,
          ruleChartBasis: form.ruleChartBasis,
          ruleCompliant:  form.ruleSplitEntry && form.ruleSlTpSet && form.ruleChartBasis,
          notes:          form.notes.trim(),
          status:       form.pending ? 'pending' : 'closed',
        });
      };

      const inp    = "w-full bg-gray-700 text-white rounded-lg px-3 py-2 text-sm border border-gray-600 focus:border-blue-500 focus:outline-none placeholder-gray-500";
      const accent = 'bg-blue-600 hover:bg-blue-500';

      return (
        <form onSubmit={handleSubmit} className="bg-gray-800 rounded-xl p-6 space-y-4 fade-in">
          <div className="flex items-center justify-between">
            <h3 className="text-base font-bold text-white flex items-center gap-2">
              {editTrade&&editTrade.status==='pending' ? '⏳ 結果を記録' : editTrade ? '✏️ 編集' : '➕ 新規記録'}
            </h3>
            {/* Pending toggle (only for new trades or existing pending) */}
            {(!editTrade || editTrade.status==='pending') && (
              <label className="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" checked={form.pending} onChange={e=>set('pending',e.target.checked)} className="w-4 h-4 rounded accent-amber-500" />
                <span className="text-amber-400 text-xs font-medium">⏳ 未決済として保存</span>
              </label>
            )}
          </div>

          {error&&<div className="bg-red-900/50 border border-red-600 text-red-300 text-sm rounded-lg px-4 py-2">{error}</div>}

          {form.pending && (
            <div className="bg-amber-950/50 border border-amber-700 rounded-lg px-4 py-2 text-amber-300 text-xs">
              ⏳ 未決済として保存します。あとで「結果を記録」ボタンから損益を更新できます。
            </div>
          )}

          <div className="grid grid-cols-2 gap-4">
            <div>
              <label className="block text-gray-400 text-xs mb-1">日付</label>
              <input type="date" value={form.date} onChange={e=>set('date',e.target.value)} className={inp} />
            </div>
            <div>
              <label className="block text-gray-400 text-xs mb-1">通貨ペア / 銘柄</label>
              <input type="text" placeholder="例: USD/JPY" value={form.pair} onChange={e=>set('pair',e.target.value)} className={inp} />
            </div>
          </div>

          {/* P&L section — hidden when pending */}
          {!form.pending && (
            <div className="grid grid-cols-3 gap-4">
              <div>
                <label className="block text-gray-400 text-xs mb-1">結果</label>
                <select value={form.result} onChange={e=>set('result',e.target.value)} className={inp}>
                  <option value="win">✅ 勝ち (Win)</option>
                  <option value="loss">❌ 負け (Loss)</option>
                </select>
              </div>
              <div>
                <label className="block text-gray-400 text-xs mb-1">粗損益 ($)</label>
                <input type="number" step="0.01" min="0" placeholder="0.00" value={form.pnl} onChange={e=>set('pnl',e.target.value)} className={inp} />
              </div>
              <div>
                <label className="block text-gray-400 text-xs mb-1 flex items-center justify-between">
                  <span>手数料 ($) <span className="text-gray-600">スプレッド含む</span></span>
                </label>
                <input type="number" step="0.01" min="0" placeholder="0.00" value={form.commission} onChange={e=>set('commission',e.target.value)} className={inp} />
              </div>
            </div>
          )}

          {/* Net P&L preview */}
          {!form.pending && !isNaN(pnlVal) && pnlVal > 0 && (
            <div className={`flex items-center justify-between rounded-lg px-4 py-2.5 ${netVal>=0?'bg-emerald-950/40 border border-emerald-800':'bg-red-950/40 border border-red-800'}`}>
              <span className="text-gray-400 text-xs">純損益 (手数料差引後)</span>
              <span className={`font-mono font-bold ${netVal>=0?'text-emerald-300':'text-red-300'}`}>
                {fmt$(netVal)}
                {commVal > 0 && <span className="text-gray-500 font-normal text-xs ml-2">(手数料: -${commVal.toFixed(2)})</span>}
              </span>
            </div>
          )}

          <div className="grid grid-cols-3 gap-4">
            <div>
              <label className="block text-gray-400 text-xs mb-1">RR比 <span className="text-gray-600">(1:XX)</span></label>
              <input type="number" step="0.01" min="0" placeholder="2.00" value={form.rr} onChange={e=>set('rr',e.target.value)} className={inp} />
            </div>
            <div>
              <label className="block text-gray-400 text-xs mb-1">ロット数</label>
              <input type="number" step="0.01" min="0" placeholder="0.10" value={form.lotSize} onChange={e=>set('lotSize',e.target.value)} className={inp} />
            </div>
            <div>
              <label className="block text-gray-400 text-xs mb-1">エントリー価格</label>
              <input type="number" step="0.0000000001" min="0" placeholder="0.0000000001" value={form.entryPrice} onChange={e=>set('entryPrice',e.target.value)} className={inp} />
            </div>
          </div>

          {/* Position size + pnl% computed preview */}
          {posSize > 0 && (
            <div className="flex items-center gap-4 rounded-lg bg-gray-700/40 px-4 py-2.5 text-xs">
              <div className="flex items-center gap-2">
                <span className="text-gray-400">ポジションサイズ</span>
                <span className="font-mono font-bold text-blue-300">${posSize.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
              </div>
              {pnlPct !== null && (
                <div className="flex items-center gap-2">
                  <span className="text-gray-400">損益%</span>
                  <span className={`font-mono font-bold ${pnlPct>=0?'text-emerald-400':'text-red-400'}`}>
                    {pnlPct>=0?'+':''}{pnlPct.toFixed(2)}%
                  </span>
                </div>
              )}
            </div>
          )}

          {/* Entry rule checklist */}
          <div>
            <label className="block text-gray-400 text-xs mb-2">
              エントリールール チェックリスト
              {!(form.ruleSplitEntry&&form.ruleSlTpSet&&form.ruleChartBasis)&&
                <span className="ml-2 text-yellow-400">⚠️ 未チェック項目あり（ルール違反）</span>}
            </label>
            <div className="bg-gray-700/40 rounded-lg p-3 space-y-2">
              {TRADE_RULES.map(r=>(
                <label key={r.key} className="flex items-start gap-2.5 cursor-pointer group">
                  <input type="checkbox" checked={form[r.key]} onChange={e=>set(r.key,e.target.checked)}
                    className="w-4 h-4 rounded accent-blue-500 mt-0.5 flex-shrink-0"/>
                  <span className={`text-sm leading-snug ${form[r.key]?'text-gray-200':'text-yellow-400'}`}>{r.label}</span>
                </label>
              ))}
            </div>
          </div>

          <div>
            <label className="block text-gray-400 text-xs mb-1">メモ / 振り返り <span className="text-gray-600">(任意)</span></label>
            <textarea rows={2} placeholder="エントリー根拠、早期決済の理由など..." value={form.notes} onChange={e=>set('notes',e.target.value)} className={`${inp} resize-none`} />
          </div>

          <div className="flex gap-3 pt-1">
            <button type="submit" className={`flex-1 ${accent} text-white rounded-lg py-2.5 text-sm font-semibold transition-colors`}>
              {editTrade&&editTrade.status==='pending'?'結果を確定する':editTrade?'更新する':'記録する'}
            </button>
            {onCancel&&(
              <button type="button" onClick={onCancel} className="px-6 bg-gray-700 hover:bg-gray-600 text-gray-300 rounded-lg py-2.5 text-sm transition-colors">
                キャンセル
              </button>
            )}
          </div>
        </form>
      );
    };

    // ══════════════════════════════════════════════════════════════════════
    // TRADE TABLE
    // ══════════════════════════════════════════════════════════════════════
    const TradeTable = ({ trades, month, onEdit, onDelete }) => {
      const rows = trades
        .filter(t => t.date.startsWith(month))
        .sort((a,b) => {
          // pending first, then by date desc
          if (a.status==='pending' && b.status!=='pending') return -1;
          if (b.status==='pending' && a.status!=='pending') return 1;
          return b.date.localeCompare(a.date);
        });

      const hasCommission = rows.some(t=>(t.commission||0)>0);

      return (
        <div className="bg-gray-800 rounded-xl overflow-hidden">
          <div className="px-5 py-4 border-b border-gray-700 flex items-center justify-between">
            <h3 className="font-bold text-white text-sm flex items-center gap-2">
              📋 トレード履歴
            </h3>
            <div className="flex items-center gap-3">
              {rows.some(t=>t.status==='pending')&&<span className="text-amber-400 text-xs">⏳ 未決済あり</span>}
              <span className="text-gray-500 text-xs bg-gray-700 px-2 py-0.5 rounded-full">{rows.length} 件</span>
            </div>
          </div>

          {rows.length===0 ? (
            <div className="p-10 text-center text-gray-500 text-sm">この月のデータがありません</div>
          ) : (
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className="text-gray-500 text-xs bg-gray-900/40">
                    <th className="text-left px-4 py-3">日付</th>
                    <th className="text-left px-4 py-3">ペア</th>
                    <th className="text-center px-4 py-3">状態</th>
                    <th className="text-right px-4 py-3">粗損益</th>
                    <th className="text-right px-4 py-3">手数料</th>
                    <th className="text-right px-4 py-3">純損益</th>
                    <th className="text-right px-4 py-3">ポジション</th>
                    <th className="text-right px-4 py-3">損益%</th>
                    <th className="text-left px-4 py-3">メモ</th>
                    <th className="px-4 py-3"></th>
                  </tr>
                </thead>
                <tbody>
                  {rows.map((t, i) => {
                    const isPending = t.status==='pending';
                    const comm      = t.commission||0;
                    const nPnl      = netPnl(t);
                    const grossPnl  = t.pnl||0;
                    const tPosSize  = (t.lotSize||0) * (t.entryPrice||0);
                    const tPnlPct   = tPosSize > 0 && !isPending ? (nPnl / tPosSize * 100) : null;

                    return (
                      <tr key={t.id} className={`border-t border-gray-700/40 transition-colors ${isPending?'pending-row':i%2===1?'bg-gray-900/20':''} hover:bg-gray-700/25`}>
                        <td className="px-4 py-3 text-gray-400 text-xs tabular-nums">{fmtDate(t.date)}</td>
                        <td className="px-4 py-3 font-medium text-white">{t.pair}</td>
                        <td className="px-4 py-3 text-center">
                          {isPending ? (
                            <span className="px-2 py-0.5 rounded-full text-xs font-semibold bg-amber-900/60 text-amber-400">⏳ 未決済</span>
                          ) : (
                            <span className={`px-2 py-0.5 rounded-full text-xs font-semibold ${t.result==='win'?'bg-emerald-900/60 text-emerald-400':'bg-red-900/60 text-red-400'}`}>
                              {t.result==='win'?'勝':'負'}
                            </span>
                          )}
                        </td>
                        <td className={`px-4 py-3 text-right font-mono text-sm ${isPending?'text-gray-600':grossPnl>=0?'text-gray-300':'text-gray-300'}`}>
                          {isPending ? '—' : fmt$(grossPnl)}
                        </td>
                        <td className="px-4 py-3 text-right font-mono text-xs text-orange-400">
                          {comm>0 ? `-$${comm.toFixed(2)}` : <span className="text-gray-700">—</span>}
                        </td>
                        <td className={`px-4 py-3 text-right font-mono font-semibold ${isPending?'text-gray-600':nPnl>=0?'text-emerald-400':'text-red-400'}`}>
                          {isPending ? <span className="text-amber-500 text-xs">記録待ち</span> : fmt$(nPnl)}
                        </td>
                        <td className="px-4 py-3 text-right font-mono text-xs text-blue-300 tabular-nums">
                          {tPosSize>0 ? `$${tPosSize.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}` : <span className="text-gray-600">—</span>}
                        </td>
                        <td className={`px-4 py-3 text-right font-mono text-xs tabular-nums font-semibold ${tPnlPct===null?'text-gray-600':tPnlPct>=0?'text-emerald-400':'text-red-400'}`}>
                          {tPnlPct===null
                            ? (isPending ? <span className="text-amber-500">記録待ち</span> : '—')
                            : `${tPnlPct>=0?'+':''}${tPnlPct.toFixed(2)}%`}
                        </td>
                        <td className="px-4 py-3 text-gray-500 text-xs max-w-[130px] truncate">{t.notes||<span className="text-gray-700">—</span>}</td>
                        <td className="px-4 py-3">
                          <div className="flex gap-2 whitespace-nowrap">
                            {isPending ? (
                              <button onClick={()=>onEdit(t)} className="text-amber-500 hover:text-amber-300 text-xs font-medium transition-colors">結果を記録</button>
                            ) : (
                              <button onClick={()=>onEdit(t)} className="text-gray-500 hover:text-blue-400 text-xs transition-colors">編集</button>
                            )}
                            <button onClick={()=>onDelete(t.id)} className="text-gray-600 hover:text-red-400 text-xs transition-colors">削除</button>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>

                {/* Month totals row */}
                {rows.some(t=>t.status!=='pending') && (
                  <tfoot>
                    <tr className="border-t-2 border-gray-600 bg-gray-900/60 text-xs font-semibold">
                      <td colSpan={3} className="px-4 py-3 text-gray-400">月次合計</td>
                      <td className="px-4 py-3 text-right font-mono text-gray-300">
                        {fmt$(rows.filter(r=>r.status!=='pending').reduce((s,t)=>s+(t.pnl||0),0))}
                      </td>
                      <td className="px-4 py-3 text-right font-mono text-orange-400">
                        {(() => { const c=rows.reduce((s,t)=>s+(t.commission||0),0); return c>0?`-$${c.toFixed(2)}`:'—'; })()}
                      </td>
                      <td className="px-4 py-3 text-right font-mono">
                        {(() => { const n=rows.filter(r=>r.status!=='pending').reduce((s,t)=>s+netPnl(t),0); return <span className={n>=0?'text-emerald-400':'text-red-400'}>{fmt$(n)}</span>; })()}
                      </td>
                      <td colSpan={4}></td>
                    </tr>
                  </tfoot>
                )}
              </table>
            </div>
          )}
        </div>
      );
    };

    // ── Trade Tab Content ─────────────────────────────────────────────────
    const TradeTabContent = ({ trades, onAddTrade, onUpdateTrade, onDeleteTrade, settings, initialBalance, month, prefill, clearPrefill }) => {
      const [showForm,  setShowForm]  = useState(!!prefill);
      const [editTrade, setEditTrade] = useState(null);

      useEffect(() => { if (prefill) setShowForm(true); }, [prefill]);

      const handleAdd = useCallback(async (trade) => {
        if (editTrade) await onUpdateTrade(trade);
        else           await onAddTrade(trade);
        setEditTrade(null); setShowForm(false); clearPrefill?.();
      }, [editTrade, onAddTrade, onUpdateTrade, clearPrefill]);

      const handleEdit   = useCallback((trade) => { setEditTrade(trade); setShowForm(true); window.scrollTo({top:0,behavior:'smooth'}); }, []);
      const handleDelete = useCallback(async (id) => { if(window.confirm('削除しますか？')) await onDeleteTrade(id); }, [onDeleteTrade]);

      const metrics = useMemo(()=>calcMetrics(trades, initialBalance, settings, month), [trades, initialBalance, settings, month]);

      const kpi = {
        compliance: kpiStat(metrics.complianceRate, settings.minComplianceRate),
        winRate:    kpiStat(metrics.winRate,         settings.minWinRate),
        rr:         kpiStat(metrics.avgRR,           settings.minRR),
        pnl:        kpiStat(metrics.monthNetPnL,     metrics.monthTarget),
      };

      return (
        <div className="space-y-5">
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
            <KPICard label="ルール遵守率" priority displayValue={metrics.complianceRate!==null?`${metrics.complianceRate.toFixed(1)}%`:'—'} targetLabel={`${settings.minComplianceRate}%以上`} status={kpi.compliance} />
            <KPICard label="勝率" displayValue={metrics.winRate!==null?`${metrics.winRate.toFixed(1)}%`:'—'} targetLabel={`${settings.minWinRate}%以上`} status={kpi.winRate} sub={metrics.total>0?`${metrics.wins}勝 ${metrics.losses}負`:''} />
            <KPICard label="平均 RR" displayValue={metrics.avgRR!==null?`1:${metrics.avgRR.toFixed(2)}`:'—'} targetLabel={`1:${settings.minRR.toFixed(1)}以上`} status={kpi.rr} />
            <KPICard label="今月純損益" displayValue={metrics.total>0?fmt$(metrics.monthNetPnL):'$0.00'} targetLabel={`$${metrics.monthTarget.toFixed(0)}`} status={kpi.pnl} />
          </div>

          {/* Commission row */}
          {metrics.monthCommission > 0 && (
            <div className="bg-gray-800 rounded-xl px-5 py-3 flex items-center gap-6 text-sm">
              <span className="text-gray-500 text-xs">今月の手数料:</span>
              <span className="text-orange-400 font-mono font-semibold">-${metrics.monthCommission.toFixed(2)}</span>
              <span className="text-gray-600">|</span>
              <span className="text-gray-500 text-xs">粗利益比:</span>
              <span className="text-orange-400 font-mono">{metrics.commissionRate.toFixed(1)}%</span>
              <span className="text-gray-600">|</span>
              <span className="text-gray-500 text-xs">平均/取引:</span>
              <span className="text-orange-400 font-mono">${metrics.total>0?(metrics.monthCommission/metrics.total).toFixed(2):'—'}</span>
            </div>
          )}

          <div className="flex justify-end">
            <button onClick={()=>{ setEditTrade(null); clearPrefill?.(); setShowForm(v=>!v); }}
              className="bg-blue-600 hover:bg-blue-500 text-white rounded-lg px-5 py-2 text-sm font-semibold transition-colors flex items-center gap-2">
              <span>＋</span> トレード記録
            </button>
          </div>

          {showForm&&(
            <TradeForm onAdd={handleAdd} onCancel={()=>{setShowForm(false);setEditTrade(null);clearPrefill?.();}} editTrade={editTrade} prefill={prefill} />
          )}

          <TradeTable trades={trades} month={month} onEdit={handleEdit} onDelete={handleDelete} />

          <div className="bg-gray-800 rounded-xl p-6">
            <h3 className="text-sm font-bold text-white mb-4">📈 資産推移</h3>
            <AssetChart trades={trades} initialBalance={initialBalance} color='#10b981' label='口座残高' />
          </div>
        </div>
      );
    };

    // ══════════════════════════════════════════════════════════════════════
    // SETTINGS FORM
    // ══════════════════════════════════════════════════════════════════════
    const SettingsForm = ({ settings, onSave }) => {
      const [form, setForm] = useState({...settings});
      const [saved, setSaved] = useState(false);
      const set = (k,v) => setForm(f=>({...f,[k]:v}));
      const inp = "w-full bg-gray-700 text-white rounded-lg px-3 py-2 text-sm border border-gray-600 focus:border-blue-500 focus:outline-none";
      const sec = "text-gray-400 font-semibold text-xs uppercase tracking-widest mb-3";
      const calc$ = (pct) => ((parseFloat(form.initialBalance)||0)*(parseFloat(pct)||0)/100).toFixed(2);

      const handleSubmit = async (e) => {
        e.preventDefault();
        const p = (k,d) => Math.max(0.01, parseFloat(form[k])||d);
        await onSave({
          initialBalance:     Math.max(1, parseFloat(form.initialBalance)||1000),
          monthlyTargetPct:   p('monthlyTargetPct',20),
          dailyLossLimitPct:  p('dailyLossLimitPct',6),
          monthlyDDLimitPct:  p('monthlyDDLimitPct',10),
          minWinRate:         p('minWinRate',50),
          minRR:              p('minRR',2.0),
          minComplianceRate:  p('minComplianceRate',90),
          maxRiskPerTradePct: p('maxRiskPerTradePct',2),
        });
        setSaved(true); setTimeout(()=>setSaved(false),2500);
      };

      return (
        <form onSubmit={handleSubmit} className="max-w-lg space-y-5">
          {saved&&<div className="bg-emerald-900/50 border border-emerald-600 text-emerald-300 text-sm rounded-xl px-4 py-3 fade-in">✅ 設定を保存しました</div>}

          <div className="bg-gray-800 rounded-xl p-6 space-y-4">
            <p className={sec}>💼 リアル口座</p>
            {[{k:'initialBalance',label:'初期口座残高 ($)',step:'1'},{k:'monthlyTargetPct',label:'月次利益目標 (%)',step:'0.1',hint:true}].map(({k,label,step,hint})=>(
              <div key={k}>
                <label className="block text-gray-400 text-xs mb-1">{label}</label>
                <input type="number" step={step} min="0.01" value={form[k]} onChange={e=>set(k,e.target.value)} className={inp} />
                {hint&&<p className="text-gray-600 text-xs mt-1">→ 目標額: ${calc$(form.monthlyTargetPct)}</p>}
              </div>
            ))}
          </div>

          <div className="bg-gray-800 rounded-xl p-6 space-y-4">
            <p className={sec}>🔴 リスク上限</p>
            {[
              {k:'dailyLossLimitPct', label:'1日の損失上限 (%)'},
              {k:'monthlyDDLimitPct', label:'月次最大ドローダウン (%)'},
              {k:'maxRiskPerTradePct',label:'1トレード最大リスク (%) — エントリー判定で使用'},
            ].map(({k,label})=>(
              <div key={k}>
                <label className="block text-gray-400 text-xs mb-1">{label}</label>
                <input type="number" step="0.1" min="0.1" value={form[k]} onChange={e=>set(k,e.target.value)} className={inp} />
                <p className="text-gray-600 text-xs mt-1">→ -${calc$(form[k])}</p>
              </div>
            ))}
          </div>

          <div className="bg-gray-800 rounded-xl p-6 space-y-4">
            <p className={sec}>📊 KPI 目標</p>
            {[
              {k:'minComplianceRate',label:'ルール遵守率 (%)',priority:true},
              {k:'minWinRate',       label:'最低勝率 (%)'},
              {k:'minRR',           label:'最低平均 RR (例: 2 → 1:2)',step:'0.1'},
            ].map(({k,label,priority,step})=>(
              <div key={k}>
                <label className="block text-gray-400 text-xs mb-1">{label}{priority&&<span className="text-red-400 ml-1">●</span>}</label>
                <input type="number" step={step||'1'} min="0.1" value={form[k]} onChange={e=>set(k,e.target.value)} className={inp} />
              </div>
            ))}
          </div>

          <button type="submit" className="w-full bg-blue-600 hover:bg-blue-500 text-white rounded-xl py-3 text-sm font-semibold transition-colors">
            設定を保存する
          </button>
        </form>
      );
    };

    // ══════════════════════════════════════════════════════════════════════
    // DASHBOARD TAB
    // ══════════════════════════════════════════════════════════════════════
    const DashboardTab = ({ trades, settings, month }) => {
      const metrics = useMemo(()=>calcMetrics(trades, settings.initialBalance, settings, month),[trades,settings,month]);

      const kpi = {
        compliance: kpiStat(metrics.complianceRate, settings.minComplianceRate),
        winRate:    kpiStat(metrics.winRate,         settings.minWinRate),
        rr:         kpiStat(metrics.avgRR,           settings.minRR),
        dd:         metrics.total===0?'neutral':kpiStat(metrics.maxDD,-settings.monthlyDDLimitPct,false),
        daily:      metrics.dailyLimitHit?'bad':(Math.abs(metrics.todayLoss)>0?'warn':'neutral'),
      };

      return (
        <div className="space-y-5">
          <AlertBanner metrics={metrics} settings={settings} />
          <KGICard metrics={metrics} settings={settings} month={month} initialBalance={settings.initialBalance} />

          <div>
            <h2 className="text-gray-500 text-xs font-semibold uppercase tracking-widest mb-3">KPI スコアカード <span className="text-red-400">●</span> = 最重要</h2>
            <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3">
              <KPICard label="ルール遵守率" priority displayValue={metrics.complianceRate!==null?`${metrics.complianceRate.toFixed(1)}%`:'—'} targetLabel={`${settings.minComplianceRate}%以上`} status={kpi.compliance} />
              <KPICard label="勝率" displayValue={metrics.winRate!==null?`${metrics.winRate.toFixed(1)}%`:'—'} targetLabel={`${settings.minWinRate}%以上`} status={kpi.winRate} sub={metrics.total>0?`${metrics.wins}勝 ${metrics.losses}負`:''} />
              <KPICard label="平均 RR" displayValue={metrics.avgRR!==null?`1:${metrics.avgRR.toFixed(2)}`:'—'} targetLabel={`1:${settings.minRR.toFixed(1)}以上`} status={kpi.rr} />
              <KPICard label="月次最大 DD" displayValue={metrics.total>0?`${metrics.maxDD.toFixed(1)}%`:'—'} targetLabel={`-${settings.monthlyDDLimitPct}%以内`} status={kpi.dd} />
              <KPICard label="本日の損失" priority displayValue={metrics.todayLoss<0?fmt$(metrics.todayLoss):'$0.00'} targetLabel={`-$${metrics.dailyLossLimitAmt.toFixed(0)}以内`} status={kpi.daily} />
            </div>
          </div>

          <CommissionPanel metrics={metrics} />

          <div className="bg-gray-800 rounded-xl p-6">
            <h2 className="text-sm font-bold text-white mb-4">📈 資産推移</h2>
            <AssetChart trades={trades} initialBalance={settings.initialBalance} />
          </div>


          <div className="grid grid-cols-3 gap-4">
            {[
              {label:'今月のトレード',value:`${metrics.total}`,sub:`${metrics.wins}勝 / ${metrics.losses}負`,color:'text-white'},
              {label:'今月の純損益',  value:metrics.total>0?fmt$(metrics.monthNetPnL):'$0.00',sub:`粗利益: ${fmt$(metrics.monthGrossPnL)}`,color:metrics.monthNetPnL>=0?'text-emerald-400':'text-red-400'},
              {label:'累計収益率',    value:fmtPct((metrics.currentBalance-settings.initialBalance)/settings.initialBalance*100),sub:`$${settings.initialBalance} → $${metrics.currentBalance.toFixed(2)}`,color:metrics.currentBalance>=settings.initialBalance?'text-emerald-400':'text-red-400'},
            ].map(({label,value,sub,color})=>(
              <div key={label} className="bg-gray-800 rounded-xl p-4">
                <div className="text-gray-500 text-xs mb-1">{label}</div>
                <div className={`text-2xl font-bold font-mono ${color}`}>{value}</div>
                <div className="text-gray-600 text-xs mt-1">{sub}</div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // ══════════════════════════════════════════════════════════════════════
    // CARD COMPONENTS
    // ══════════════════════════════════════════════════════════════════════
    const SUITS = [
      {key:'s', sym:'♠', cls:'text-gray-900'},
      {key:'h', sym:'♥', cls:'text-red-600'},
      {key:'d', sym:'♦', cls:'text-red-600'},
      {key:'c', sym:'♣', cls:'text-gray-900'},
    ];
    const RANKS = ['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
    const POSITIONS = ['UTG','UTG+1','UTG+2','LJ','HJ','CO','BTN','SB','BB'];

    const CardDisplay = ({ card }) => {
      if (!card?.rank) return (
        <div className="w-8 h-11 bg-gray-700 border border-dashed border-gray-600 rounded flex items-center justify-center text-gray-600 text-lg select-none">?</div>
      );
      const s = SUITS.find(x=>x.key===card.suit)||SUITS[0];
      return (
        <div className="w-8 h-11 bg-white rounded shadow flex flex-col items-center justify-center select-none">
          <span className={`text-xs font-black leading-none ${s.cls}`}>{card.rank}</span>
          <span className={`text-sm leading-none ${s.cls}`}>{s.sym}</span>
        </div>
      );
    };

    const CardPicker = ({ value, onChange }) => {
      const [open, setOpen] = useState(false);
      const [tempSuit, setTempSuit] = useState(null);
      const ref = useRef(null);

      useEffect(() => {
        const handler = (e) => { if(ref.current && !ref.current.contains(e.target)) { setOpen(false); setTempSuit(null); }};
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      const SUIT_UI = [
        {key:'s',sym:'♠',bg:'hover:bg-gray-600',sel:'bg-gray-600',tc:'text-gray-100'},
        {key:'h',sym:'♥',bg:'hover:bg-red-900',sel:'bg-red-800',tc:'text-red-400'},
        {key:'d',sym:'♦',bg:'hover:bg-red-900',sel:'bg-red-800',tc:'text-red-400'},
        {key:'c',sym:'♣',bg:'hover:bg-gray-600',sel:'bg-gray-600',tc:'text-gray-100'},
      ];

      return (
        <div className="relative" ref={ref}>
          <div onClick={()=>{setOpen(!open);setTempSuit(null);}} className="cursor-pointer">
            <CardDisplay card={value}/>
          </div>
          {open && (
            <div className="absolute z-50 bg-gray-800 border border-gray-600 rounded-xl p-3 shadow-2xl" style={{minWidth:'200px',top:'48px',left:'0'}}>
              {value && <button onClick={()=>{onChange(null);setOpen(false);}} className="w-full text-xs text-gray-500 hover:text-red-400 mb-2 text-left">✕ クリア</button>}
              <div className="text-gray-500 text-xs mb-1">{tempSuit?'ランクを選択':'スートを選択'}</div>
              <div className="flex gap-1 mb-2">
                {SUIT_UI.map(s=>(
                  <button key={s.key} onClick={()=>setTempSuit(s.key)}
                    className={`flex-1 py-1.5 rounded text-lg font-bold transition-colors ${s.tc} ${tempSuit===s.key?s.sel:s.bg} bg-gray-700`}>
                    {s.sym}
                  </button>
                ))}
              </div>
              <div className="grid grid-cols-7 gap-1">
                {RANKS.map(r=>(
                  <button key={r} onClick={()=>{ if(tempSuit){ onChange({suit:tempSuit,rank:r}); setOpen(false); setTempSuit(null); }}}
                    className={`py-1 rounded text-xs font-bold transition-colors ${tempSuit?'bg-gray-700 hover:bg-blue-600 text-white cursor-pointer':'bg-gray-700/40 text-gray-600 cursor-default'}`}>
                    {r}
                  </button>
                ))}
              </div>
              {!tempSuit&&<p className="text-gray-600 text-xs mt-2 text-center">↑ まずスートを選んでください</p>}
            </div>
          )}
        </div>
      );
    };

    // ══════════════════════════════════════════════════════════════════════
    // HAND REVIEW
    // ══════════════════════════════════════════════════════════════════════
    // ── Hand Review: per-player action row (defined outside form for stable identity) ──
    const HRActionRows = ({ street, players, actsObj, heroPos, vilPos, onSetAct }) => (
      <div className="space-y-0.5 py-1">
        {players.map(pos => {
          const isHero = pos===heroPos, isVil = pos===vilPos;
          const act = actsObj[pos]||{action:'fold',bet:''};
          const showBet = act.action==='call'||act.action==='raise';
          return (
            <div key={pos} className="flex items-center gap-1 min-h-[22px]">
              <span className={`text-xs font-bold w-14 text-right flex-shrink-0 ${isHero?'text-green-400':isVil?'text-red-400':'text-gray-500'}`}>
                {pos}{isHero?' ★':isVil?' ●':''}
              </span>
              <select value={act.action}
                onChange={e=>onSetAct(street, pos, {action:e.target.value, bet:(e.target.value==='fold'||e.target.value==='check')?'':act.bet})}
                className="bg-gray-700 text-white rounded px-1 py-0.5 text-xs border border-gray-600 focus:border-purple-500 focus:outline-none flex-shrink-0" style={{width:'62px'}}>
                <option value="fold">Fold</option>
                <option value="check">Check</option>
                <option value="call">Call</option>
                <option value="raise">Raise</option>
              </select>
              {showBet&&<>
                <input type="number" step="0.5" min="0" value={act.bet}
                  onChange={e=>onSetAct(street, pos, {bet:e.target.value})}
                  className="w-14 bg-gray-700 text-white rounded px-1.5 py-0.5 text-xs border border-gray-600 focus:border-purple-500 focus:outline-none text-center"/>
                <span className="text-gray-500 text-xs">bb</span>
              </>}
            </div>
          );
        })}
      </div>
    );

    // ── Hand Review: street row layout ──
    const HRStreetRow = ({ label, color, leftContent, pot, actionContent, memo, onMemo, minH='110px' }) => (
      <div className="grid border-t border-gray-700/60" style={{gridTemplateColumns:'18% 30% 52%'}}>
        <div className="border-r border-gray-700/60 p-3">
          <div className="flex items-center justify-between mb-2">
            <span className={`text-xs font-bold uppercase tracking-wider ${color}`}>{label}</span>
            <span className="text-xs font-mono font-bold text-yellow-300">{typeof pot==='number'?pot.toFixed(1):'0.0'}bb</span>
          </div>
          {leftContent}
        </div>
        <div className="border-r border-gray-700/60 px-2 py-1 overflow-y-auto" style={{minHeight:minH}}>
          {actionContent}
        </div>
        <div className="p-2" style={{minHeight:minH}}>
          <textarea value={memo} onChange={e=>onMemo(e.target.value)} placeholder="分析メモ…"
            className="bg-gray-700/80 text-white rounded-lg px-3 py-2 text-sm border border-gray-600 focus:border-purple-500 focus:outline-none resize-none w-full"
            style={{minHeight:minH}}/>
        </div>
      </div>
    );

    const HandReviewForm = ({ review, onSave, onCancel }) => {
      const isEdit = !!review;
      const INIT_ACTS = () => Object.fromEntries(POSITIONS.map(p=>[p,{action:'fold',bet:''}]));

      const parseActsFromStr = (raw) => {
        const result = INIT_ACTS();
        try {
          const parsed = JSON.parse(raw||'{}');
          if (Array.isArray(parsed.actions)) {
            parsed.actions.forEach(({position,action,bet})=>{
              if (position) result[position]={action:action||'fold', bet:bet||''};
            });
          }
        } catch {}
        return result;
      };

      const [form, setForm] = useState(() => {
        if (review) {
          let anteData={hasAnte:false,anteBb:1};
          try { const p=JSON.parse(review.preflopAction||'{}'); anteData={hasAnte:!!p.hasAnte,anteBb:p.anteBb||1}; } catch {}
          return {
            date:review.date, heroPosition:review.heroPosition||'BTN', villainPosition:review.villainPosition||'BB',
            heroHand:Array.isArray(review.heroHand)?review.heroHand:[null,null],
            villainHand:Array.isArray(review.villainHand)?review.villainHand:[null,null],
            flopBoard:Array.isArray(review.flopBoard)?review.flopBoard:[null,null,null],
            turnCard:review.turnCard||null, riverCard:review.riverCard||null,
            preflopActs:parseActsFromStr(review.preflopAction),
            flopActs:   parseActsFromStr(review.flopAction),
            turnActs:   parseActsFromStr(review.turnAction),
            riverActs:  parseActsFromStr(review.riverAction),
            hasAnte:anteData.hasAnte, anteBb:anteData.anteBb,
            preflopMemo:review.preflopMemo||'', flopMemo:review.flopMemo||'',
            turnMemo:review.turnMemo||'',       riverMemo:review.riverMemo||'',
            resultBb:review.resultBb!=null?String(review.resultBb):'',
            notes:review.notes||'', id:review.id,
          };
        }
        return {
          date:todayStr(), heroPosition:'BTN', villainPosition:'BB',
          heroHand:[null,null], villainHand:[null,null], flopBoard:[null,null,null],
          turnCard:null, riverCard:null,
          preflopActs:INIT_ACTS(), flopActs:INIT_ACTS(), turnActs:INIT_ACTS(), riverActs:INIT_ACTS(),
          hasAnte:false, anteBb:1,
          preflopMemo:'', flopMemo:'', turnMemo:'', riverMemo:'',
          resultBb:'', notes:'',
        };
      });

      const set = (k,v) => setForm(f=>({...f,[k]:v}));
      const setCard = (field,idx,card) => setForm(f=>{
        const arr=[...(Array.isArray(f[field])?f[field]:[])]; arr[idx]=card; return {...f,[field]:arr};
      });
      const setAct = (street,pos,upd) => setForm(f=>({
        ...f,
        [`${street}Acts`]:{...f[`${street}Acts`],[pos]:{...(f[`${street}Acts`][pos]||{action:'fold',bet:''}), ...upd}}
      }));

      // Active players per street
      const flopActive  = useMemo(()=>POSITIONS.filter(p=>form.preflopActs[p]?.action!=='fold'),[form.preflopActs]);
      const turnActive  = useMemo(()=>flopActive.filter(p=>form.flopActs[p]?.action!=='fold'),[flopActive,form.flopActs]);
      const riverActive = useMemo(()=>turnActive.filter(p=>form.turnActs[p]?.action!=='fold'),[turnActive,form.turnActs]);

      // Pot calculations
      const preflopPot = useMemo(()=>{
        const sb=form.preflopActs['SB']||{action:'fold',bet:''};
        const bb=form.preflopActs['BB']||{action:'fold',bet:''};
        let pot=0;
        // SB: fold keeps 0.5bb; call/raise: their total bet overrides the 0.5
        pot += sb.action==='fold' ? 0.5 : (parseFloat(sb.bet)||0.5);
        // BB: fold keeps 1bb; check stays 1bb; raise: their total bet overrides the 1
        pot += (bb.action==='fold'||bb.action==='check') ? 1 : (parseFloat(bb.bet)||1);
        // Ante
        if (form.hasAnte) pot += parseFloat(form.anteBb)||1; // BB ante: 1 player only
        // Other positions
        POSITIONS.filter(p=>p!=='SB'&&p!=='BB').forEach(p=>{
          const a=form.preflopActs[p]||{action:'fold'};
          if (a.action!=='fold') pot+=parseFloat(a.bet)||0;
        });
        return parseFloat(pot.toFixed(2));
      },[form.preflopActs,form.hasAnte,form.anteBb]);

      const flopPot = useMemo(()=>{
        let add=0; flopActive.forEach(p=>{const a=form.flopActs[p]||{action:'fold'};if(a.action!=='fold'&&a.action!=='check')add+=parseFloat(a.bet)||0;});
        return parseFloat((preflopPot+add).toFixed(2));
      },[preflopPot,form.flopActs,flopActive]);

      const turnPot = useMemo(()=>{
        let add=0; turnActive.forEach(p=>{const a=form.turnActs[p]||{action:'fold'};if(a.action!=='fold'&&a.action!=='check')add+=parseFloat(a.bet)||0;});
        return parseFloat((flopPot+add).toFixed(2));
      },[flopPot,form.turnActs,turnActive]);

      const riverPot = useMemo(()=>{
        let add=0; riverActive.forEach(p=>{const a=form.riverActs[p]||{action:'fold'};if(a.action!=='fold'&&a.action!=='check')add+=parseFloat(a.bet)||0;});
        return parseFloat((turnPot+add).toFixed(2));
      },[turnPot,form.riverActs,riverActive]);

      const serActs = (acts, players, extra={}) => JSON.stringify({
        actions: players.map(p=>({position:p, action:acts[p]?.action||'fold', bet:acts[p]?.bet||''})),
        ...extra
      });

      const submit = () => {
        if (!form.date){alert('日付を入力してください');return;}
        onSave({
          id:form.id||uid(), date:form.date,
          heroPosition:form.heroPosition, villainPosition:form.villainPosition,
          heroHand:form.heroHand, villainHand:form.villainHand,
          flopBoard:form.flopBoard, turnCard:form.turnCard, riverCard:form.riverCard,
          preflopAction:serActs(form.preflopActs, POSITIONS, {hasAnte:form.hasAnte, anteBb:parseFloat(form.anteBb)||1}),
          flopAction:   serActs(form.flopActs,    flopActive),
          turnAction:   serActs(form.turnActs,    turnActive),
          riverAction:  serActs(form.riverActs,   riverActive),
          preflopPotBb:preflopPot, flopPotBb:flopPot, turnPotBb:turnPot, riverPotBb:riverPot,
          preflopMemo:form.preflopMemo, flopMemo:form.flopMemo,
          turnMemo:form.turnMemo,       riverMemo:form.riverMemo,
          resultBb:form.resultBb!==''&&form.resultBb!==null?parseFloat(form.resultBb):null,
          notes:form.notes,
        });
      };
